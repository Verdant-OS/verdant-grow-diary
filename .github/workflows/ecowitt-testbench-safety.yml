name: EcoWitt Windows Testbench safety

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  testbench-static-safety:
    name: Typecheck + static safety scan for tools/ecowitt-testbench
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # No secrets required: this job is safe for forked PRs.
      - name: Typecheck
        run: bun run typecheck

      # Stop-ship: fails if a committed token/secret pattern, weakened
      # forwarding opt-in, weakened demo source requirement, weakened
      # Authorization ASCII validation, weakened debug-endpoint local-only
      # access, raw-token exposure, or Supabase client / service-role
      # imports appear in tools/ecowitt-testbench/.
      - name: EcoWitt Windows testbench static safety tests
        run: bunx vitest run src/test/ecowitt-windows-testbench-static-safety.test.ts --reporter=dot
