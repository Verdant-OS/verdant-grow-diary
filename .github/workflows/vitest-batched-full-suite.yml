name: Vitest Batched Full Suite (optional)

# Optional, manual-only batched full-suite validation. Mirrors the
# Verdant Batched Validation Runner v1 — runs src/test in deterministic
# batches so the full suite can complete in CI without OOM/timeout.
# Does NOT replace the existing PR-default gates in ci.yml.

on:
  workflow_dispatch:
    inputs:
      batches:
        description: "Total batches"
        required: false
        default: "8"
      reporter:
        description: "Vitest reporter (dot|verbose)"
        required: false
        default: "dot"

jobs:
  batched-suite:
    name: Batched Vitest (matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Raise Node's old-space heap above the 2 GB default so individual
    # vitest batches (notably batch 2) do not OOM mid-run. GitHub-hosted
    # ubuntu-latest runners ship with ~7 GB RAM, so 4096 MB is safe.
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    strategy:
      fail-fast: false
      matrix:
        batch: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Safety gates (typecheck + sensor + docs)
        run: |
          bun run typecheck
          node scripts/sensor-safety-check.mjs
          node scripts/assert-sensor-intelligence-safety.mjs --quiet
          bun run test:docs-demo-safety

      - name: Batch utils self-test
        run: node scripts/test-vitest-batch-utils.mjs

      - name: Run batch ${{ matrix.batch }} of ${{ github.event.inputs.batches }}
        run: |
          node scripts/run-vitest-batches.mjs \
            --batches=${{ github.event.inputs.batches }} \
            --batch=${{ matrix.batch }} \
            --reporter=${{ github.event.inputs.reporter }}
