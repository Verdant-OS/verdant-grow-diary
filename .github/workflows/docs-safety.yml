name: docs-safety

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unified docs safety scanners
        run: bun run docs:assert-safety

      - name: Run automated phenotyping docs safety tests
        run: bunx vitest run src/test/assert-automated-phenotyping-docs-safety.test.ts --reporter=dot
