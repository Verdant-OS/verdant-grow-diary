name: Apply Strain Reference Typecheck Fix

on:
  push:
    branches:
      - feature/strain-reference-library-v1
    paths:
      - ".github/workflows/diagnose-strain-reference-typecheck.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/strain-reference-library-v1
          fetch-depth: 0

      - name: Apply scoped ES target compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("src/pages/CultivarPage.tsx")
          text = path.read_text(encoding="utf-8")
          replacements = {
              'key.replaceAll("_", "-")': 'key.replace(/_/g, "-")',
              'source.sourceType.replaceAll("_", " ")': 'source.sourceType.replace(/_/g, " ")',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one occurrence of {old!r}; found {count}")
              text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
          PY
          rm -f .diagnostics/strain-reference-typecheck.txt
          rm -f .github/workflows/diagnose-strain-reference-typecheck.yml

      - name: Commit scoped fix and remove diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "fix(strains): support repository ES target and remove diagnostics"
          git push origin HEAD:feature/strain-reference-library-v1
