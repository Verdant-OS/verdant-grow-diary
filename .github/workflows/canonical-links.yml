name: canonical-links

on:
  pull_request:
    paths:
      - "src/**"
      - "index.html"
      - "scripts/validate-canonical-links.mjs"
      - "vite.config.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/canonical-links.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build (runs postbuild canonical validator)
        run: bun run build
      - name: Explicit canonical link check
        run: bun run check:canonical-links
      - name: Validator unit tests
        run: bunx vitest run src/test/validate-canonical-links.test.ts --reporter=dot
