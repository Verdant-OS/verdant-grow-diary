name: edge-shared-sync

on:
  pull_request:
    paths:
      - "src/lib/**"
      - "src/constants/**"
      - "src/integrations/supabase/types.ts"
      - "supabase/functions/**"
      - "scripts/sync-edge-shared.mjs"
      - "scripts/verify-edge-shared-in-sync.mjs"
      - ".github/workflows/edge-shared-sync.yml"
  push:
    branches: [main]
    paths:
      - "src/lib/**"
      - "src/constants/**"
      - "src/integrations/supabase/types.ts"
      - "supabase/functions/**"
      - "scripts/sync-edge-shared.mjs"
      - "scripts/verify-edge-shared-in-sync.mjs"

jobs:
  verify:
    name: Verify _shared/lib mirror is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fail on any ../../../src/lib import in supabase/functions/*/index.ts
        run: node scripts/check-no-src-lib-imports.mjs
      - name: Verify committed edge shared-lib mirror matches src/ (with PR annotations)
        run: node scripts/annotate-edge-shared-drift.mjs
