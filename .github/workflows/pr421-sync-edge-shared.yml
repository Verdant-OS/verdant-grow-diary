name: PR 421 Canonical Edge Mirror Sync

on:
  push:
    branches:
      - fix/workflow-policy-release-gates-20260722

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/workflow-policy-release-gates-20260722
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate and verify Edge mirror
        shell: bash
        run: |
          set -euo pipefail
          bun run sync-edge-shared
          bun run verify-edge-shared-in-sync
          git diff --check

      - name: Commit generated output when changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- supabase/functions; then
            echo "Edge mirror already synchronized."
            exit 0
          fi

          unexpected="$(git status --porcelain | awk '$2 !~ /^supabase\/functions\// { print }')"
          if [ -n "$unexpected" ]; then
            echo "Canonical sync changed an unexpected path:"
            echo "$unexpected"
            exit 1
          fi

          git add supabase/functions
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          HUSKY=0 git -c core.hooksPath=/dev/null commit -m "chore(edge): sync generated shared mirror"
          git push origin HEAD:fix/workflow-policy-release-gates-20260722
