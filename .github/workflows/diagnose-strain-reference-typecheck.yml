name: Diagnose Strain Reference Typecheck

on:
  push:
    branches:
      - feature/strain-reference-library-v1
    paths:
      - ".github/workflows/diagnose-strain-reference-typecheck.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/strain-reference-library-v1
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture typecheck output
        shell: bash
        run: |
          set +e
          bun run typecheck > /tmp/strain-typecheck.txt 2>&1
          status=$?
          set -e
          mkdir -p .diagnostics
          {
            echo "exit_code=$status"
            echo "--- typecheck output ---"
            cat /tmp/strain-typecheck.txt
          } > .diagnostics/strain-reference-typecheck.txt

      - name: Commit diagnostic output
        shell: bash
        run: |
          set -euo pipefail
          git add .diagnostics/strain-reference-typecheck.txt
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "chore(strains): capture focused typecheck diagnostics"
          git push origin HEAD:feature/strain-reference-library-v1
