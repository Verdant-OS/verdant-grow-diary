name: AI Doctor Golden Cases

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ai-doctor-golden-cases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Strict: runs golden case suite + sensor safety scanner. No dry-run.
      - name: Run AI Doctor golden cases + sensor safety
        run: bun run test:ai-doctor-golden-cases
