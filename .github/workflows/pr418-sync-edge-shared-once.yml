name: PR 418 one-shot edge shared sync

on:
  push:
    branches:
      - feature/strain-reference-library-v1
    paths:
      - ".github/workflows/pr418-sync-edge-shared-once.yml"

permissions:
  contents: write

concurrency:
  group: pr418-sync-edge-shared-once
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact triggering branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/strain-reference-library-v1
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate edge shared mirror
        run: bun run sync-edge-shared

      - name: Enforce generated-only scope
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t changed < <(git status --porcelain | sed -E 's/^.. //')
          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "Mirror already in sync; nothing to commit."
            exit 0
          fi
          printf 'Generated changes:\n'
          printf '  %s\n' "${changed[@]}"
          for path in "${changed[@]}"; do
            case "$path" in
              supabase/functions/_shared/lib/*) ;;
              *)
                echo "Unexpected non-generated path changed: $path" >&2
                exit 1
                ;;
            esac
          done

      - name: Verify generated output
        run: |
          bun run verify-edge-shared-in-sync
          bun run check:no-src-lib-imports

      - name: Abort if branch advanced during generation
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin feature/strain-reference-library-v1
          remote_head="$(git rev-parse origin/feature/strain-reference-library-v1)"
          if [[ "$remote_head" != "$GITHUB_SHA" ]]; then
            echo "Branch advanced from $GITHUB_SHA to $remote_head; refusing to push generated output." >&2
            exit 1
          fi

      - name: Commit generated mirror
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- supabase/functions/_shared/lib; then
            echo "No generated diff to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/functions/_shared/lib
          git commit -m "chore(edge): sync generated shared mirror for PR 418"
          git push origin HEAD:feature/strain-reference-library-v1
