name: Founder owner prefs e2e (mocked)

# Non-destructive Playwright smoke for the /founder owner preferences form.
#
# SAFETY:
#  - Mocked / non-destructive only. Every Supabase /rest/v1/**, /auth/v1/**,
#    and /functions/v1/** request is intercepted via page.route() inside the
#    spec; no real Supabase endpoint is contacted.
#  - No real accounts, no real founder rows, no real prefs writes.
#  - No real secrets are read.
#  - Runs on every push and on pull_request (safe event only).

on:
  push:
  pull_request:

jobs:
  founder-owner-prefs-e2e:
    name: Founder owner prefs e2e (mocked / non-destructive)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      # The Playwright browser binary is pinned by the @playwright/test version
      # in package.json (currently 1.56.1 → Chromium 1194). Keying the cache on
      # the lockfile + package.json guarantees a cache miss whenever the
      # Playwright version changes, so we never run tests against a stale
      # browser build.
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Install Chromium only (with deps)
        run: bunx playwright install chromium --with-deps

      - name: Run founder owner prefs spec (chromium-mocked)
        run: bunx playwright test e2e/founder-owner-prefs.spec.ts --project=chromium-mocked

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: founder-owner-prefs-playwright-report
          path: playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test-results
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: founder-owner-prefs-test-results
          path: test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Job summary — mocked/non-destructive
        if: ${{ always() }}
        run: |
          {
            echo "### Founder owner prefs e2e (mocked / non-destructive)";
            echo "";
            echo "- Mocked / non-destructive: **yes**";
            echo "- No real founder rows created or modified";
            echo "- No real prefs writes";
            echo "- All Supabase /rest/v1/**, /auth/v1/**, and /functions/v1/**";
            echo "  traffic intercepted via page.route()";
            echo "- Playwright browser pinned via @playwright/test version in package.json";
          } >> "$GITHUB_STEP_SUMMARY"
