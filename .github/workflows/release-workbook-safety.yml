name: release-workbook-safety

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/assert-premium-workbook-access-docs.mjs"
      - "scripts/assert-release-traceability-mapping.mjs"
      - "scripts/generate-release-workbook-templates.mjs"
      - "scripts/assert-release-docs-safety.mjs"
      - "scripts/sensor-safety-check.mjs"
      - "src/test/assert-premium-workbook-access-docs.test.ts"
      - "src/test/assert-release-traceability-mapping.test.ts"
      - "src/test/generate-release-workbook-templates.test.ts"
      - "src/test/release-workbook-formula-snapshots.test.ts"
      - "src/test/release-workbook-manifest.test.ts"
      - "scripts/verify-release-workbooks.mjs"
      - ".github/workflows/release-workbook-safety.yml"
      - "package.json"
      - "bun.lockb"
  workflow_dispatch:

jobs:
  release-workbook-safety:
    name: Workbook safety + traceability + snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release workbooks (aggregator)
        run: bun run docs:verify-release-workbooks

      - name: Upload generated artifacts (diagnostic)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-workbook-templates-v1.3
          path: docs/artifacts/
          if-no-files-found: error
          retention-days: 14
