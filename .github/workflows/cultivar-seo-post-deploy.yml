name: Cultivar SEO post-deploy

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      deployed_url:
        description: "Deployed base URL"
        required: false
        default: "https://verdantgrowdiary.com"

permissions:
  contents: read

concurrency:
  group: cultivar-seo-post-deploy-${{ github.event.deployment.id || github.run_id }}
  cancel-in-progress: false

jobs:
  raw-crawler-smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    env:
      SMOKE_BASE: ${{ github.event.inputs.deployed_url || github.event.deployment_status.environment_url || 'https://verdantgrowdiary.com' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.deployment.sha || github.sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify raw HTML, query canonicals, redirects, and PNG cards
        run: bun run verify:cultivar-seo-deployment
