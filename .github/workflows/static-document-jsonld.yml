name: static-document-jsonld

on:
  pull_request:
    paths:
      - "src/**"
      - "index.html"
      - "scripts/validate-static-document-jsonld.mts"
      - "scripts/validate-jsonld-rich-results.mjs"
      - "vite.config.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/static-document-jsonld.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build (runs postbuild JSON-LD + static-doc validators)
        run: bun run build
      - name: Explicit static-document JSON-LD check
        run: bun run check:static-document-jsonld
      - name: Validator unit tests
        run: bunx vitest run src/test/validate-static-document-jsonld.test.ts --reporter=dot
