name: Quick Log Playwright smoke

# Authenticated Quick Log Playwright smoke harness.
#
# SAFETY:
#  - No auth bypass.
#  - No hardcoded credentials in the workflow.
#  - No elevated DB role usage.
#  - No checked-in storageState; the setup project signs in via the real /auth UI
#    using repository secrets, or skips with a clear message.
#  - Uploads Playwright report + smoke JSON/text report as artifacts on every run.
#  - Never uses the elevated PR target event — only the safe pull_request event.
#
# Triggers:
#  - workflow_dispatch: manual run; fails fast if required secrets/URL are missing.
#  - push to verdant-grow-diary: best-effort; skips cleanly if secrets are unavailable.
#  - pull_request to verdant-grow-diary: best-effort; PRs without access to E2E vars/secrets
#    (e.g. forked PRs) skip cleanly with a clear non-secret message and the job
#    completes successfully.
#
# Required repository secrets / vars (configure in GitHub → Settings):
#   secrets.E2E_TEST_EMAIL
#   secrets.E2E_TEST_PASSWORD
#   vars.E2E_BASE_URL              (e.g. https://<preview-or-staging>.example)
#   vars.E2E_GROW_1_PLANT_URL      (full URL of a Grow #1 plant page)
#   vars.E2E_GROW_2_PLANT_NAME     (optional; defaults to "505 Headbanger")

on:
  workflow_dispatch:
  push:
    branches: [verdant-grow-diary]
    paths:
      - "e2e/**"
      - "playwright.config.ts"
      - ".github/workflows/quicklog-smoke.yml"
  pull_request:
    branches: [verdant-grow-diary]
    paths:
      - "e2e/**"
      - "playwright.config.ts"
      - ".github/workflows/quicklog-smoke.yml"

jobs:
  quicklog-smoke:
    name: Quick Log Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      E2E_GROW_1_PLANT_URL: ${{ vars.E2E_GROW_1_PLANT_URL }}
      E2E_GROW_2_PLANT_NAME: ${{ vars.E2E_GROW_2_PLANT_NAME }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required configuration
        id: e2e_config
        shell: bash
        run: |
          # Track presence (never echo values). Only NAMES of missing config
          # are emitted — never the values of any var or secret.
          missing=()
          [ -n "$E2E_BASE_URL" ] || missing+=("vars.E2E_BASE_URL")
          [ -n "$E2E_GROW_1_PLANT_URL" ] || missing+=("vars.E2E_GROW_1_PLANT_URL")
          [ -n "$E2E_TEST_EMAIL" ] || missing+=("secrets.E2E_TEST_EMAIL")
          [ -n "$E2E_TEST_PASSWORD" ] || missing+=("secrets.E2E_TEST_PASSWORD")

          event="${{ github.event_name }}"

          # Sanitized, comma-separated list of missing config NAMES.
          missing_csv=""
          if [ ${#missing[@]} -gt 0 ]; then
            missing_csv=$(IFS=, ; echo "${missing[*]}")
          fi
          echo "missing_config=${missing_csv}" >> "$GITHUB_OUTPUT"

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required Quick Log smoke configuration: ${missing[*]}"
            if [ "$event" = "workflow_dispatch" ]; then
              echo "Missing required Quick Log smoke configuration. Configure Actions vars/secrets." >&2
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 1
            elif [ "$event" = "pull_request" ]; then
              echo "Skipping Quick Log smoke: E2E vars/secrets are unavailable for this PR context."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            else
              echo "Skipping Quick Log smoke: E2E vars/secrets are unavailable for this event."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Quick Log smoke configuration present. Proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.e2e_config.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Best-effort cache for Bun's package cache. Never includes auth state,
      # storageState, smoke reports, traces, screenshots, videos, or secrets.
      - name: Cache Bun packages
        if: steps.e2e_config.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Best-effort cache for Playwright browser binaries. Never includes auth
      # state, storageState, smoke reports, traces, screenshots, videos, or
      # secrets. `bun run e2e:install:ci` still runs below to verify Chromium
      # and OS deps after restore.
      - name: Cache Playwright browsers
        if: steps.e2e_config.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        if: steps.e2e_config.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium (with OS deps)
        if: steps.e2e_config.outputs.should_run == 'true'
        run: bun run e2e:install:ci

      - name: Run Quick Log Playwright smoke
        id: quicklog_smoke
        if: steps.e2e_config.outputs.should_run == 'true'
        run: bun run e2e:quicklog-smoke

      - name: Verify Quick Log smoke artifacts
        if: always() && steps.e2e_config.outputs.should_run == 'true'
        shell: bash
        run: |
          # After a real smoke execution the JSON report + Playwright HTML
          # report must exist. If either is missing the run is not a usable
          # smoke result — fail the job so we never publish a green run that
          # produced no evidence. Never echoes secret values.
          status=0

          if [ -f "e2e/results/quicklog-smoke-report.json" ]; then
            echo "OK: e2e/results/quicklog-smoke-report.json present"
          else
            echo "MISSING (required): e2e/results/quicklog-smoke-report.json" >&2
            status=1
          fi

          if [ -d "playwright-report" ]; then
            echo "OK: playwright-report/ present"
          else
            echo "MISSING (required): playwright-report/ directory" >&2
            status=1
          fi

          if [ -f "e2e/results/quicklog-smoke-report.txt" ]; then
            echo "OK: e2e/results/quicklog-smoke-report.txt present"
          else
            echo "WARN: e2e/results/quicklog-smoke-report.txt missing (non-fatal)"
          fi

          if [ -d "test-results" ]; then
            echo "OK: test-results/ present"
          else
            echo "WARN: test-results/ missing (non-fatal; may be empty on full pass)"
          fi

          exit "$status"

      - name: Capture Quick Log smoke metadata
        id: smoke_meta
        if: always() && steps.e2e_config.outputs.should_run == 'true'
        shell: bash
        run: |
          # Best-effort capture of smoke counts + Playwright version for the
          # GitHub Actions step summary. Never echoes secret values. Failures
          # here must not mask the real Playwright failure: this step always
          # exits 0 and emits explicit "unavailable" sentinels when fields
          # cannot be determined. Distinguishes:
          #   report_parse_status=parsed  -> counts successfully extracted
          #   report_parse_status=missing -> report JSON not produced
          #   report_parse_status=failed  -> report JSON present but parsing failed
          set +e

          pw_version="$(bunx playwright --version 2>/dev/null | tr -d '\r' | head -n1)"
          if [ -z "${pw_version}" ]; then
            pw_version="unavailable"
          fi
          echo "playwright_version=${pw_version}" >> "$GITHUB_OUTPUT"

          report="e2e/results/quicklog-smoke-report.json"
          report_parse_error=""
          if [ -f "${report}" ]; then
            echo "report_json_present=true" >> "$GITHUB_OUTPUT"
            counts="$(node -e '
              try {
                const fs = require("fs");
                const r = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
                const pick = (...keys) => {
                  for (const k of keys) {
                    const v = k.split(".").reduce((o, p) => (o == null ? o : o[p]), r);
                    if (typeof v === "number") return v;
                  }
                  return null;
                };
                const steps = Array.isArray(r.steps) ? r.steps : (Array.isArray(r.results) ? r.results : null);
                let total = pick("total", "stats.total", "counts.total");
                let passed = pick("passed", "stats.passed", "counts.passed", "ok");
                let failed = pick("failed", "stats.failed", "counts.failed", "failures");
                let skipped = pick("skipped", "stats.skipped", "counts.skipped");
                if (steps) {
                  const norm = s => String(s ?? "").toLowerCase();
                  if (total == null) total = steps.length;
                  if (passed == null) passed = steps.filter(s => ["pass","passed","ok","success"].includes(norm(s.status ?? s.result))).length;
                  if (failed == null) failed = steps.filter(s => ["fail","failed","error"].includes(norm(s.status ?? s.result))).length;
                  if (skipped == null) skipped = steps.filter(s => ["skip","skipped"].includes(norm(s.status ?? s.result))).length;
                }
                const out = [total, passed, failed, skipped].map(v => (typeof v === "number" ? v : ""));
                process.stdout.write(out.join("|"));
              } catch (e) {
                process.stderr.write(String(e && e.message ? e.message : e).slice(0, 200));
                process.stdout.write("");
              }
            ' "${report}" 2> /tmp/smoke_meta_err.txt)"
            IFS='|' read -r smoke_total smoke_passed smoke_failed smoke_skipped <<< "${counts}"
            if [ -n "${smoke_total}${smoke_passed}${smoke_failed}${smoke_skipped}" ]; then
              echo "smoke_counts_available=true" >> "$GITHUB_OUTPUT"
              echo "report_parse_status=parsed" >> "$GITHUB_OUTPUT"
              echo "smoke_total=${smoke_total:-unknown}" >> "$GITHUB_OUTPUT"
              echo "smoke_passed=${smoke_passed:-unknown}" >> "$GITHUB_OUTPUT"
              echo "smoke_failed=${smoke_failed:-unknown}" >> "$GITHUB_OUTPUT"
              echo "smoke_skipped=${smoke_skipped:-unknown}" >> "$GITHUB_OUTPUT"
            else
              echo "smoke_counts_available=false" >> "$GITHUB_OUTPUT"
              echo "report_parse_status=failed" >> "$GITHUB_OUTPUT"
              if [ -s /tmp/smoke_meta_err.txt ]; then
                # Sanitize: single line, strip $ and backticks, cap length.
                report_parse_error="$(tr '\n' ' ' < /tmp/smoke_meta_err.txt | tr -d '`$' | head -c 200)"
              else
                report_parse_error="unable to extract counts from report JSON"
              fi
              echo "report_parse_error=${report_parse_error}" >> "$GITHUB_OUTPUT"
              echo "::warning::Quick Log smoke metadata parsing failed: ${report_parse_error}"
            fi
          else
            echo "report_json_present=false" >> "$GITHUB_OUTPUT"
            echo "smoke_counts_available=false" >> "$GITHUB_OUTPUT"
            echo "report_parse_status=missing" >> "$GITHUB_OUTPUT"
            echo "report_parse_error=" >> "$GITHUB_OUTPUT"
            echo "::warning::Quick Log smoke report JSON missing at ${report}"
          fi

          exit 0

      - name: Upload smoke artifacts
        if: always() && steps.e2e_config.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quicklog-smoke-artifacts
          if-no-files-found: warn
          retention-days: 30
          path: |
            e2e/results/quicklog-smoke-report.json
            e2e/results/quicklog-smoke-report.txt
            playwright-report/
            test-results/

      - name: Upload Playwright HTML report
        id: upload_playwright_report
        if: always() && steps.e2e_config.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quicklog-playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn


      - name: Write Quick Log smoke run summary
        if: always()
        shell: bash
        env:
          SHOULD_RUN: ${{ steps.e2e_config.outputs.should_run }}
          MISSING_CONFIG: ${{ steps.e2e_config.outputs.missing_config }}
          JOB_STATUS: ${{ job.status }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACTS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
          SMOKE_COUNTS_AVAILABLE: ${{ steps.smoke_meta.outputs.smoke_counts_available }}
          SMOKE_TOTAL: ${{ steps.smoke_meta.outputs.smoke_total }}
          SMOKE_PASSED: ${{ steps.smoke_meta.outputs.smoke_passed }}
          SMOKE_FAILED: ${{ steps.smoke_meta.outputs.smoke_failed }}
          SMOKE_SKIPPED: ${{ steps.smoke_meta.outputs.smoke_skipped }}
          PLAYWRIGHT_VERSION: ${{ steps.smoke_meta.outputs.playwright_version }}
        run: |
          # Never echo secret values. Only references to secret NAMES are written.
          {
            echo "## Quick Log Playwright smoke"
            echo ""
            echo "- Workflow result: \`${JOB_STATUS}\`"
            echo "- Event: \`${EVENT_NAME}\`"
            echo "- Branch/ref: \`${{ github.ref }}\`"
            echo "- [Workflow run](${RUN_URL})"
            echo "- [Artifacts](${ARTIFACTS_URL})"
            if [ "${SHOULD_RUN}" = "true" ]; then
              echo "- Smoke executed: yes"
              echo ""
              echo "### Smoke run"
              echo ""
              echo "- Command: \`bun run e2e:quicklog-smoke\`"
              echo "- Browser: \`chromium\`"
              echo "- Playwright: \`${PLAYWRIGHT_VERSION:-unavailable}\`"
              echo ""
              echo "### Smoke counts"
              echo ""
              if [ "${SMOKE_COUNTS_AVAILABLE}" = "true" ]; then
                echo "| total | passed | failed | skipped |"
                echo "| ----- | ------ | ------ | ------- |"
                echo "| ${SMOKE_TOTAL} | ${SMOKE_PASSED} | ${SMOKE_FAILED} | ${SMOKE_SKIPPED} |"
              else
                echo "Smoke counts unavailable: report JSON was not produced."
              fi
              echo ""
              echo "### Artifacts"
              echo ""
              echo "- Artifact name: \`quicklog-smoke-artifacts\`"
              echo "- Retention: 30 days"
              echo "- Run artifacts page: ${ARTIFACTS_URL}"
              echo ""
              echo "Contents:"
              echo ""
              echo "- \`e2e/results/quicklog-smoke-report.json\`"
              echo "- \`e2e/results/quicklog-smoke-report.txt\`"
              echo "- \`playwright-report/\`"
              echo "- \`test-results/\`"
              echo ""
              echo "### Troubleshooting"
              echo ""
              echo "Open \`quicklog-smoke-report.txt\` first (then the JSON sibling) and find the first \`✗\` line. Then inspect the matching Playwright trace, screenshots, and video under \`playwright-report/\` and \`test-results/\`."
            else
              echo "- Smoke executed: no (skipped)"
              echo ""
              echo "### Skipped: required Quick Log smoke configuration was unavailable"
              echo ""
              echo "Missing required Quick Log smoke configuration prevented execution."
              echo ""
              echo "Required configuration (names only — values are never printed):"
              echo ""
              echo "- \`vars.E2E_BASE_URL\`"
              echo "- \`vars.E2E_GROW_1_PLANT_URL\`"
              echo "- \`secrets.E2E_TEST_EMAIL\`"
              echo "- \`secrets.E2E_TEST_PASSWORD\`"
              echo ""
              if [ -n "${MISSING_CONFIG}" ]; then
                echo "Missing in this run:"
                echo ""
                # MISSING_CONFIG is a comma-separated list of NAMES only.
                IFS=',' read -ra _names <<< "${MISSING_CONFIG}"
                for n in "${_names[@]}"; do
                  echo "- \`${n}\`"
                done
                echo ""
              fi
              if [ "${EVENT_NAME}" = "pull_request" ] || [ "${EVENT_NAME}" = "push" ]; then
                echo "This is a clean skip for the \`${EVENT_NAME}\` event — forks and branch contexts without access to E2E vars/secrets are expected to skip without failing."
              elif [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
                echo "On \`workflow_dispatch\`, missing required configuration fails fast in the \`Verify required configuration\` step before later steps run. Configure the Actions vars/secrets above and re-dispatch."
              fi
              echo ""
              echo "No smoke artifacts were produced because the smoke did not execute."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
