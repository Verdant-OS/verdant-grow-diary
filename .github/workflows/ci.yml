name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      # Stop-ship: the V0 operating loop contract test must pass.
      # See docs/v0-operating-loop-demo.md ("V0 contract test").
      - name: V0 operating loop contract test
        run: bunx vitest run src/test/v0-operating-loop-contract.test.ts

      # Stop-ship: Gate 2A CSV import safety + manual sensor freshness/delta
      # invariants must pass before any sensor-touching change merges.
      - name: Sensor safety tests (CSV + manual freshness/delta)
        run: bun run test:sensor-safety

      # Stop-ship: Action Queue provenance + alert/session token leak
      # static-safety scans must pass on every PR.
      - name: Static safety scans (Action Queue provenance + chip)
        run: bun run test:static-safety

      # Stop-ship: QuickLog v2 RPC ownership / reason-code / mixed-boundary
      # regression. See docs/quicklog-rpc-safety.md.
      - name: QuickLog v2 RPC ownership + security
        run: bun run test:quicklog-rpc-ownership

      # Stop-ship: gamification writes must remain RPC-only.
      # Static scan: no client-side .from('nug_events'|'unlocks'|'user_quests').insert.
      - name: Gamification direct-insert scan + static tests
        run: bun run test:security-gamification

      # Stop-ship: live RLS/RPC verification for gamification.
      # Confirms INSERT policies stay dropped, SELECT policies + award_nugs
      # grants remain intact. Skipped (neutral) on PRs without DB access.
      - name: Gamification RLS live verification
        if: ${{ env.SUPABASE_DB_URL != '' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: bun run check:gamification-rls

      # Optional: end-to-end smoke that award_nugs works via authenticated
      # session. Requires staging env vars; skipped (neutral) without them.
      - name: Gamification award_nugs smoke (staging)
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' && env.SUPABASE_ANON_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bun run smoke:award-nugs

      - name: Full test suite
        run: bunx vitest run

      - name: Build
        run: bun run build
