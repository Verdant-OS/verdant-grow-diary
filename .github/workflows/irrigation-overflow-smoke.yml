name: Irrigation overflow smoke (mocked)

# Non-destructive Playwright overflow proof for the isolated
# <StructuredWateringEntry> surface (Irrigation Evidence Ledger V1).
#
# SAFETY:
#  - Mocked / non-destructive only. Mounts a standalone Vite fixture
#    (e2e/fixtures/irrigation-overflow.html) — no app routing, no auth, and
#    the canonical writer is a no-op in the fixture, so no Supabase write is
#    ever issued.
#  - No real accounts created, no real grow data touched, no secrets read.
#  - Uses the SAFE pull_request event only — never the elevated PR target event.
#  - No schedule/cron trigger.

on:
  pull_request:
    branches: [verdant-grow-diary]
    paths:
      - "e2e/irrigation-overflow.spec.ts"
      - "e2e/fixtures/irrigation-overflow.html"
      - "e2e/fixtures/irrigation-overflow-entry.tsx"
      - "src/components/irrigation/StructuredWateringEntry.tsx"
      - "playwright.config.ts"
      - ".github/workflows/irrigation-overflow-smoke.yml"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"
  workflow_dispatch: {}

jobs:
  irrigation-overflow-smoke:
    name: Irrigation overflow smoke (mocked / non-destructive)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Install Chromium only (with deps)
        run: bunx playwright install chromium --with-deps

      - name: Run mocked irrigation overflow proof (320 / 375 / 390 / 768 / 1440)
        run: bunx playwright test e2e/irrigation-overflow.spec.ts --project=chromium-mocked

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: irrigation-overflow-playwright-report
          path: playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test-results
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: irrigation-overflow-test-results
          path: test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Job summary — mocked/non-destructive
        if: ${{ always() }}
        run: |
          {
            echo "### Irrigation overflow smoke (mocked / non-destructive)";
            echo "";
            echo "- Mocked / non-destructive: **yes**";
            echo "- Standalone Vite fixture — no app routing, no auth";
            echo "- Canonical writer is a no-op in the fixture — no Supabase write";
            echo "- Zero horizontal overflow asserted at 320 / 375 / 390 / 768 / 1440";
          } >> "$GITHUB_STEP_SUMMARY"
