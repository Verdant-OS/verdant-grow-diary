name: edge-shared-sync

on:
  pull_request:
    # Run on every PR — do not path-filter. A PR that only touches
    # unrelated files can still regress edge-function imports (e.g. a
    # merge of stale mirror state), so the gate must always run.
  push:
    branches: [main]


jobs:
  verify:
    name: Verify _shared/lib mirror is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fail on any ../../../src/lib import in supabase/functions/*/index.ts
        run: node scripts/check-no-src-lib-imports.mjs
      - name: Verify committed edge shared-lib mirror matches src/ (with PR annotations)
        run: node scripts/annotate-edge-shared-drift.mjs
