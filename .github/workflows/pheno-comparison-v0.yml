name: Pheno Comparison v0

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pheno-comparison-v0:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Pheno Comparison Vitest specs — read-only surface, no secrets required.
      - name: Vitest — Pheno Comparison
        run: |
          bunx vitest run \
            src/test/pheno-comparison-hardening.test.tsx \
            src/test/pheno-comparison-never-healthy-invariant.test.tsx \
            src/test/pheno-comparison-no-network.test.tsx \
            src/test/pheno-comparison-page.test.tsx \
            src/test/pheno-comparison-static-safety.test.ts \
            src/test/pheno-comparison-view-model.test.ts \
            src/test/pheno-comparison-a11y.test.tsx \
            src/test/pheno-comparison-visual-style-invariant.test.tsx

      # Contextual Pheno Comparison v0 suite — reuses existing script.
      - name: Vitest — Contextual Pheno Comparison v0
        run: bun run test:contextual-pheno-comparison-v0

      # Contextual Pheno Comparison viewport a11y (375px + 768px).
      - name: Vitest — Contextual Pheno Comparison a11y viewports
        run: |
          bunx vitest run \
            src/test/contextual-pheno-comparison-a11y-viewports.test.tsx

      # Route manifest sync — ensures /pheno-comparison + /pheno-hunts/:id/compare
      # stay wired.
      - name: Vitest — route manifest sync
        run: |
          bunx vitest run \
            $(git ls-files 'src/test/**/*route*manifest*' 'src/test/**/route-manifest*' 2>/dev/null || true) \
            --passWithNoTests

      - name: Typecheck
        run: bun run typecheck

      # Narrow lint step.
      #
      # WHY NARROW: repo-wide `bun run lint` currently reports 90 pre-existing
      # ESLint errors across unrelated files (spider-farmer, verdant-genetics,
      # bucket-owner-policies, etc.). Fixing those is out of scope for the
      # pheno comparison hardening slice. This step lints the exact pheno /
      # contextual pheno source + presenter-owned test files this workflow
      # protects, and MUST stay green on every PR.
      - name: Lint — Pheno / Contextual Pheno owned files
        run: |
          bunx eslint \
            src/pages/PhenoComparison.tsx \
            src/components/ContextualPhenoComparisonPanel.tsx \
            src/lib/phenoComparisonRules.ts \
            src/lib/contextualPhenoComparisonViewModel.ts \
            src/test/pheno-comparison-a11y.test.tsx \
            src/test/pheno-comparison-visual-style-invariant.test.tsx \
            src/test/contextual-pheno-comparison-a11y-viewports.test.tsx \
            src/test/contextual-pheno-comparison-panel-a11y.test.tsx

      # Playwright — Pheno Comparison specs only. Route is mounted outside
      # AppShell (fixture-only), so no auth secrets are required and the
      # mocked project (chromium-mocked) is used to skip storageState setup.
      - name: Install Playwright browsers (Chromium only)
        run: bunx playwright install --with-deps chromium

      - name: Playwright — Pheno Comparison
        run: |
          bunx playwright test \
            --project=chromium-mocked \
            --reporter=list,html \
            e2e/pheno-comparison-responsive.spec.ts \
            e2e/pheno-comparison-reload.spec.ts \
            e2e/pheno-comparison-visual-style.spec.ts \
            e2e/pheno-hunts-compare-deep-link.spec.ts \
            e2e/pheno-hunts-compare-invalid-id.spec.ts

      # On failure, upload Playwright debugging artifacts for triage:
      # HTML report, traces/videos/screenshots (test-results/), and the
      # visual-style review screenshots. Config uses trace/video/screenshot
      # = *-on-failure, so nothing is captured on green runs.
      #
      # SAFETY: uploads ONLY report/results/review-screenshot paths. It never
      # uploads e2e/ wholesale (which can hold e2e/.auth/user.json), nor .env,
      # tokens, or any storageState auth artifacts.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pheno-playwright-artifacts
          if-no-files-found: ignore
          retention-days: 14
          path: |
            playwright-report/
            test-results/
            e2e/screenshots/
