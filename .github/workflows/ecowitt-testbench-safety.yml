name: EcoWitt Windows Testbench safety

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  testbench-static-safety:
    name: Typecheck + static safety scan for tools/ecowitt-testbench
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # No secrets required: this job is safe for forked PRs.
      - name: Typecheck
        run: bun run typecheck

      # Stop-ship: fails if a committed token/secret pattern, weakened
      # forwarding opt-in, weakened demo source requirement, weakened
      # Authorization ASCII validation, weakened debug-endpoint local-only
      # access, raw-token exposure, or Supabase client / service-role
      # imports appear in tools/ecowitt-testbench/.
      - name: EcoWitt Windows testbench static safety tests
        run: bunx vitest run src/test/ecowitt-windows-testbench-static-safety.test.ts --reporter=dot

      # Scoped secret scan over tools/ecowitt-testbench only. Requires no
      # repository secrets. Allows the documented placeholder token
      # (vbt_REPLACE_WITH_REAL_TOKEN) and the runtime-assembled _SR_MARKER
      # used by the sanitizer. Fails on anything that looks like a real
      # bridge token, JWT, service-role marker, or hardcoded credential.
      - name: Testbench-only secret scan (tools/ecowitt-testbench)
        run: |
          set -e
          DIR=tools/ecowitt-testbench
          fail=0

          scan() {
            local label="$1"; shift
            local pattern="$1"; shift
            # Optional allowlist regex passed via $1; matches are dropped.
            local allow="${1:-}"
            local hits
            if [ -n "$allow" ]; then
              hits=$(grep -RInE "$pattern" "$DIR" 2>/dev/null | grep -vE "$allow" || true)
            else
              hits=$(grep -RInE "$pattern" "$DIR" 2>/dev/null || true)
            fi
            if [ -n "$hits" ]; then
              echo "::error::Secret scan ($label) found suspicious matches:"
              echo "$hits"
              fail=1
            fi
          }

          # Real-looking vbt_ bridge tokens (allow the documented placeholder).
          scan "vbt-token" 'vbt_[A-Za-z0-9_-]{20,}' 'vbt_REPLACE_WITH_REAL_TOKEN'
          # JWT-shaped strings.
          scan "jwt"        'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'
          # Supabase admin role marker as a literal (sanitizer uses runtime _SR_MARKER).
          scan "service-role" 'service_role' '_SR_MARKER|service.\+.\+_.\+.\+role|"service" \+ "_" \+ "role"'
          scan "service-role-key-env" 'SUPABASE_SERVICE_ROLE_KEY'
          # Hardcoded Authorization: Bearer <value> (allow placeholder/env interpolation).
          scan "auth-bearer-hardcoded" 'Authorization:\s*Bearer\s+[A-Za-z0-9._-]{8,}' 'vbt_REPLACE_WITH_REAL_TOKEN|\$\{|\$env:|f"Bearer \{token\}"'
          # Obvious secret assignments with literal string values.
          scan "secret-assign" '(password|api_key|token|secret)\s*=\s*"[A-Za-z0-9_.-]{12,}"' 'vbt_REPLACE_WITH_REAL_TOKEN'

          if [ "$fail" -ne 0 ]; then
            echo "Testbench secret scan failed."
            exit 1
          fi
          echo "Testbench secret scan clean."
