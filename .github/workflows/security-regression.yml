name: Security regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

jobs:
  test-security-regression:
    name: test:security-regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check (fail fast)
        run: bun run typecheck
      - name: Supabase migration safety scan (RLS / SECURITY DEFINER / permissive policies)
        run: bun run check:supabase-security
      - name: Static client/published secret scan
        run: bun run test:security-static
      - name: Gamification direct-insert RLS scan
        run: bun run test:security-gamification
      - name: sensor_readings tent ownership RLS test
        run: bun run test:sensor-readings-tent-ownership
      - name: Payments webhook security tests
        run: bun run test:payments-security
      - name: Storage bucket policy tests
        run: bun run test:storage-security
      - name: Pi-ingest replay resistance tests
        run: bun run test:pi-ingest-security
