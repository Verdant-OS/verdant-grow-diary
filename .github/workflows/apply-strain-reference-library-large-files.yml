name: Apply Strain Reference Library V1 large files

on:
  push:
    branches:
      - feature/strain-reference-library-v1

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/strain-reference-library-v1
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Restore large source artifacts when bootstrap parts exist
        id: restore
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .bootstrap/strain-large.tar.gz.b64.part-00 ]]; then
            echo "applied=false" >> "$GITHUB_OUTPUT"
            echo "Bootstrap parts already removed; validating final branch state."
            exit 0
          fi

          cat .bootstrap/strain-large.tar.gz.b64.part-* \
            | tr -d '\n\r ' \
            | base64 --decode > /tmp/strain-reference-library-large.tar.gz
          echo "0f3d6a0bd2c926b36a059671d78eb4b99ca4cbc4b07b7218bfb4341f1dc5d6e4  /tmp/strain-reference-library-large.tar.gz" \
            | sha256sum --check --strict
          tar -xzf /tmp/strain-reference-library-large.tar.gz -C .
          rm -rf .bootstrap
          echo "applied=true" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Targeted V1 tests
        run: >-
          bunx vitest run
          src/test/strain-reference-library-v1.test.ts
          src/test/strain-reference-library-migration.test.ts
          src/test/strain-reference-library-static-safety.test.ts
          src/test/shared-search-text-rules.test.ts
          src/test/cultivar-reference-search-rules.test.ts
          src/test/cultivar-reference-view-model.test.ts
          src/test/global-search-entity-results.test.ts
          src/test/cultivars-index-v1.test.tsx
          src/test/cultivar-page-v1.test.tsx
          src/test/cultivar-index-seo-rules.test.tsx
          src/test/static-public-seo-documents.test.ts
          --reporter=verbose

      - name: Supabase migration safety
        run: bun run check:supabase-security

      - name: Sensor and no-control safety scan
        run: node scripts/sensor-safety-check.mjs

      - name: Production build and static SEO validation
        run: bun run build

      - name: Commit validated large files and remove archive parts
        if: steps.restore.outputs.applied == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "feat(strains): add source-backed V1 profiles and schema"
          git push origin HEAD:feature/strain-reference-library-v1
