name: AI Doctor Golden Cases

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ai-doctor-golden-cases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # v1.4: Complete AI Doctor Phase 1 safety suite —
      # engine, context compiler, core static safety, scanner self-tests,
      # golden cases, plus the sensor-safety static scan. No dry-run.
      - name: Run complete AI Doctor Phase 1 safety suite
        run: bun run test:ai-doctor-phase1
