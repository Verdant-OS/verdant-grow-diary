name: AI Doctor freshness gate e2e (mocked)

# Non-destructive Playwright boundary proof for the AI Doctor 48h
# snapshot-freshness gate on Plant Detail's Ask Doctor dialog.
#
# SAFETY:
#  - Mocked/non-destructive only. Every Supabase /auth/v1/** and
#    /rest/v1/** request is intercepted via page.route() inside the spec;
#    no real Supabase endpoint is contacted.
#  - No real accounts are created; the seeded session is clearly fake.
#  - No real grow data is touched (diary rows are in-memory fixtures).
#  - No real E2E credentials, no elevated DB role, no secrets are read.
#  - Uses the SAFE pull_request event only — never the elevated PR target event.
#  - No schedule/cron trigger.

on:
  pull_request:
    branches: [verdant-grow-diary]
    paths:
      - "e2e/ai-doctor-freshness-gate.spec.ts"
      - "src/components/PlantDetailDoctorLaunchDialog.tsx"
      - "src/components/PlantDetailDoctorContextPreview.tsx"
      - "src/lib/aiDoctorSnapshotStalenessExplanationViewModel.ts"
      - "src/lib/aiDoctorContextRules.ts"
      - "src/lib/aiDoctorContextViewModel.ts"
      - "src/lib/aiDoctorReadinessGateViewModel.ts"
      - "src/constants/aiDoctorContextReadiness.ts"
      - "src/hooks/useTimelineMemory.ts"
      - "src/lib/manualSnapshotDiaryAdapter.ts"
      - "playwright.config.ts"
      - ".github/workflows/ai-doctor-freshness-e2e.yml"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"

jobs:
  ai-doctor-freshness-e2e:
    name: AI Doctor freshness gate e2e (mocked / non-destructive)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Install Chromium only (with deps)
        run: bunx playwright install chromium --with-deps

      - name: Run mocked AI Doctor freshness boundary spec
        run: bunx playwright test e2e/ai-doctor-freshness-gate.spec.ts --project=chromium-mocked

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-doctor-freshness-playwright-report
          path: playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test-results
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ai-doctor-freshness-test-results
          path: test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Job summary — mocked/non-destructive
        if: ${{ always() }}
        run: |
          {
            echo "### AI Doctor freshness gate e2e (mocked / non-destructive)";
            echo "";
            echo "- Mocked / non-destructive: **yes**";
            echo "- No real accounts created";
            echo "- No real grow data touched (in-memory diary fixtures)";
            echo "- All Supabase /auth/v1/** + /rest/v1/** traffic intercepted via page.route()";
            echo "- Boundary proof: fresh (≤48h) vs stale (>48h) vs blocked (no context)";
          } >> "$GITHUB_STEP_SUMMARY"
