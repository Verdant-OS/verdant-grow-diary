<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Browser chrome -->
    <meta name="theme-color" content="#0d1a12" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon / app icons.
         TODO(favicon): produce a simplified single-glyph (leaf + pen nib) at
         32x32 and 16x16 — the full circular brand mark loses detail at tiny
         sizes. Until then we ship the full logo PNG, which still renders
         acceptably on modern high-DPI tabs. -->
    <link rel="icon" type="image/png" href="/brand/verdant-logo.png" />
    <link rel="apple-touch-icon" href="/brand/verdant-logo.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Primary SEO -->
    <title>Verdant Grow Diary</title>
    <meta
      name="description"
      content="Grow logs, sensor-aware insights, environment alerts, and cautious AI coaching for serious cultivators."
    />
    <link rel="canonical" href="https://verdantgrowdiary.com" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Open Graph -->
    <meta property="og:title" content="Verdant Grow Diary" />
    <meta
      property="og:description"
      content="Grow logs, sensor-aware insights, environment alerts, and cautious AI coaching for serious cultivators."
    />
    <meta property="og:url" content="https://verdantgrowdiary.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Verdant Grow Diary" />
    <meta property="og:image" content="https://verdantgrowdiary.com/brand/verdant-logo.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Verdant Grow Diary" />
    <meta
      name="twitter:description"
      content="Grow logs, sensor-aware insights, environment alerts, and cautious AI coaching for serious cultivators."
    />
    <meta name="twitter:image" content="https://verdantgrowdiary.com/brand/verdant-logo.png" />

    <!-- Sitewide Organization JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Verdant Grow Diary",
        "url": "https://verdantgrowdiary.com",
        "logo": "https://verdantgrowdiary.com/brand/verdant-logo.png"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
