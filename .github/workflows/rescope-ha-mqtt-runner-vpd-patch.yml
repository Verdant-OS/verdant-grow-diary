name: Rescope HA MQTT runner VPD patch

on:
  push:
    branches:
      - agent/ha-mqtt-runner-vpd-pairing
  pull_request:
    branches:
      - verdant-grow-diary
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate-and-rescope:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: agent/ha-mqtt-runner-vpd-pairing
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Restore base runner and apply scoped patch
        run: |
          git checkout origin/verdant-grow-diary -- scripts/dev/ecowitt-mqtt-runner.ts
          node scripts/dev/apply-ha-mqtt-runner-vpd-patch.mjs

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: HA runner targeted tests
        run: >-
          bunx vitest run
          src/test/ecowitt-mqtt-runner-config.test.ts
          src/test/ecowitt-mqtt-runner-ha-modes.test.ts
          src/test/ecowitt-mqtt-runner-ha-vpd-freshness.test.ts
          src/test/ecowitt-mqtt-runner-safety.test.ts
          src/test/homeAssistantEcowittMqttAdapter.test.ts
          src/test/ecowitt-mqtt-ingest-rules.test.ts
          src/test/ecowitt-mqtt-evidence.test.ts

      - name: Sensor safety scan
        run: node scripts/sensor-safety-check.mjs

      - name: Commit scoped validated patch
        shell: bash
        run: |
          rm -f .github/workflows/rescope-ha-mqtt-runner-vpd-patch.yml
          rm -f scripts/dev/apply-ha-mqtt-runner-vpd-patch.mjs
          git add -A
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          git commit --no-verify -m "fix(ha-mqtt): keep VPD runner patch scoped"
          git push origin HEAD:agent/ha-mqtt-runner-vpd-pairing
