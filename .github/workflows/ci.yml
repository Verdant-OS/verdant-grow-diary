name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ripgrep (rg) is required by scripts/scan-gamification-direct-inserts.mjs
      # (the "Gamification direct-insert scan" step). It is not preinstalled on
      # the runner, so install it before any step shells out to `rg`.
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      # Stop-ship: the V0 operating loop contract test must pass.
      # See docs/v0-operating-loop-demo.md ("V0 contract test").
      - name: V0 operating loop contract test
        run: bunx vitest run src/test/v0-operating-loop-contract.test.ts

      # Stop-ship: Gate 2A CSV import safety + manual sensor freshness/delta
      # invariants must pass before any sensor-touching change merges.
      - name: Sensor safety tests (CSV + manual freshness/delta)
        run: bun run test:sensor-safety

      # Stop-ship: Action Queue provenance + alert/session token leak
      # static-safety scans must pass on every PR.
      - name: Static safety scans (Action Queue provenance + chip)
        run: bun run test:static-safety

      # Stop-ship: client-side product code must never reference
      # service_role or SUPABASE_SERVICE_ROLE_KEY in executable code.
      # The guard strips comments, string literals, template literals,
      # and regex literals before scanning, so intentional denylist
      # strings are not flagged. See scripts/assert-client-secret-boundary.mjs.
      - name: Client secret boundary guard
        run: bun run test:client-secret-boundary

      # Non-secret proof artifact. Generated only AFTER the guard step
      # succeeds (no `if: always()`) so the upload is trusted-proof, not
      # a debugging dump. Contains a short fixed summary — no logs,
      # secrets, env, or payloads.
      - name: Client secret boundary proof artifact (compose)
        run: |
          mkdir -p artifacts/client-secret-boundary
          cat > artifacts/client-secret-boundary/client-secret-boundary-proof.txt <<'EOF'
          Client secret boundary guard: PASS
          Workflow: ci.yml
          Command: bun run test:client-secret-boundary
          Scanned client roots: src/components, src/pages, src/hooks, src/lib
          Blocked executable-code terms: SUPABASE_SERVICE_ROLE_KEY, service_role
          Secrets printed: no
          Raw logs uploaded: no
          EOF
      - name: Upload client secret boundary proof
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-secret-boundary-proof-ci
          path: artifacts/client-secret-boundary/client-secret-boundary-proof.txt
          if-no-files-found: error
          retention-days: 14

      # Stop-ship: every test file in src/test/** must route localStorage
      # through src/test/helpers/localStorageTestHelper.ts so jsdom
      # environments without a built-in localStorage (e.g. Windows + Node 26)
      # keep working via the in-memory shim installed by src/test/setup.ts.
      # See scripts/assert-test-localstorage-helper-usage.mjs.
      - name: Test localStorage helper enforcement
        run: |
          node scripts/assert-test-localstorage-helper-usage.mjs
          node scripts/test-localstorage-helper-usage-audit.mjs

      # Release docs safety: docs/releases/*.md must not claim unsafe
      # behavior (live telemetry, import writes, AI behavior changes,
      # Action Queue auto-writes, device control, schema/RLS/Edge changes,
      # or expose secrets/tokens/raw payloads). See
      # scripts/assert-release-docs-safety.mjs.
      - name: Release docs safety
        run: bun run docs:release-safety

      # AI Doctor Action Queue suggestion preview must remain read-only:
      # the preview helper + presenter must not drift into approved/queued/
      # executed wording, Action Queue writes, functions.invoke, service_role,
      # device-command or automation language. See
      # scripts/assert-ai-doctor-preview-safety.mjs.
      - name: AI Doctor preview safety
        run: bun run ai-doctor:preview-safety

      # Stop-ship: Action Queue device-control surface scanner + allow-list
      # guard tests. Locks the narrow safety-file allow-list (e.g.
      # `blocked_device_command_risk`, `DEVICE_COMMAND_PATTERNS`) so it can
      # never silently broaden into real actuator/control surfaces, unsafe
      # grower-facing equipment copy, `raw_payload` leakage, `service_role`,
      # or Bearer/API-key exposure. Runs on every PR.
      - name: Action Queue safety scanner + allow-list guards
        run: bunx vitest run src/test/action-queue-safety.test.ts src/test/action-queue-safety-allow-list-guards.test.ts --reporter=dot

      # Stop-ship: repo-wide filesystem/static scanner guards (source
      # ownership, no raw payloads, no device control, no RPC misuse,
      # route/helper leakage). Split into its own step so timeout-only
      # failures in slow sandboxes are easy to attribute and triage with
      # `bun run test:summarize-timeouts`. See
      # docs/testing/static-guards.md.
      - name: Repo-wide static guard tests (fs-walking)
        run: bun run test:static-guards

      # Stop-ship: Action Detail evidence provenance leakage guard.
      # Renders alert- and AI-derived Action Detail panels with malicious
      # mock extras and confirms no raw_payload, service_role, Bearer/JWT,
      # SUPABASE_SERVICE_ROLE_KEY, PRIVATE_API_KEY, sk_live_, or mqtt/
      # device-control strings leak into UI textContent/innerHTML.
      # Review timeline link must remain accessible and review-only.
      - name: Action Detail evidence leakage guard
        run: bun run test:action-detail-leakage

      # Stop-ship: Action Queue row evidence/provenance leakage guard.
      # View-model + static scan: no raw_payload, service_role, Bearer/JWT,
      # SUPABASE_SERVICE_ROLE_KEY, PRIVATE_API_KEY, sk_live_, mqtt/device-
      # control strings reach row-level evidence surfaces. Approval/reject
      # controls remain wired (review-only posture).
      - name: Action Queue evidence leakage guard
        run: bun run test:action-queue-evidence-leakage

      # Stop-ship: QuickLog v2 RPC ownership / reason-code / mixed-boundary
      # regression. See docs/quicklog-rpc-safety.md.
      - name: QuickLog v2 RPC ownership + security
        run: bun run test:quicklog-rpc-ownership

      # Stop-ship: gamification writes must remain RPC-only.
      # Static scan: no client-side .from('nug_events'|'unlocks'|'user_quests').insert.
      - name: Gamification direct-insert scan + static tests
        run: bun run test:security-gamification

      # NOTE: Gamification RLS live verification and award_nugs staging smoke
      # are intentionally NOT in this PR-default workflow. They require
      # privileged staging credentials (DB URL / service role / anon key) and
      # must not be reachable from untrusted PRs. They live in the separate
      # manual workflow .github/workflows/gamification-staging-smoke.yml,
      # gated on workflow_dispatch + push-to-main only.

      # Stop-ship: every Shelly H&T edge function declared in
      # supabase/config.toml must have its source file in the repo.
      - name: Shelly H&T edge function sources present
        run: bun run check:shelly-ht-edge-sources

      # Stop-ship: App route manifest must stay in sync with src/App.tsx and
      # every Alerts quick-link target must resolve to a registered, mounted
      # auth route. Runs on every PR to catch drift before the full suite.
      - name: Route manifest + Alerts quick-link drift
        run: bunx vitest run src/test/route-manifest-sync.test.ts src/test/alerts-route-quick-link-contract.test.tsx

      # Legal pages must emit canonical, OpenGraph, Twitter, and WebPage JSON-LD
      # metadata on /privacy, /terms, and /refund. Runs on every build.
      - name: Legal page SEO structured data
        run: bun run test:legal-seo

      # Stop-ship: QuickLog RPC static trust-boundary guardrails. Always runs.
      - name: QuickLog RPC static trust-boundary
        run: bun run test:db:quicklog-rpc-static

      # AI Doctor provider usage wiring (Deno) — local/unit only.
      # Exercises the public cost composer used by the ai-doctor-review
      # Edge Function at the provider response boundary. NO provider API
      # call, NO Supabase call, NO network access, NO secrets required.
      # Safe to run on every PR (including forks).
      - name: AI Doctor provider usage wiring (Deno)
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.2
        with:
          deno-version: v1.x
      # --unstable-sloppy-imports lets Deno resolve the extensionless relative
      # imports used throughout src/lib/cost (Node/Vite-style; the app tsconfig
      # sets allowImportingTsExtensions + bundler resolution). Without it Deno
      # fails on `src/lib/cost/index.ts` -> `./costDomains` with "Module not
      # found". Test-only invocation; no production source changes.
      - name: Run AI Doctor provider usage wiring tests
        run: deno test --allow-env --allow-read --unstable-sloppy-imports supabase/functions/ai-doctor-review/providerUsageWiring.test.ts

      # Optional: QuickLog RPC runtime harnesses. Only runs when staging
      # Supabase credentials are configured as repo/org secrets. The
      # orchestrator script also skips cleanly when env is missing, so this
      # step is safe to leave wired even for forked PRs.
      - name: QuickLog RPC runtime harnesses (conditional)
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' && env.SUPABASE_ANON_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bun run test:db:quicklog-rpc-runtime

      - name: Full test suite
        run: bunx vitest run

      # Scanner guardrail timeout sentinel — re-runs only the filesystem-
      # scanning guardrail suites in isolation. The CI wrapper deletes stale
      # local telemetry, runs the full scanner suite + harness self-test,
      # validates the JSONL row contract, and fails the build if any scanner
      # guardrail emits a slow-test row at or above 5000ms. This step does
      # NOT replace the full suite above. See
      # docs/testing/scanner-guardrails.md.
      - name: Scanner guardrail timeout sentinel
        run: bun run test:scanner-guardrails:ci

      - name: Upload scanner guardrail slow-test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scanner-guardrail-slow-tests
          path: test-results/scanner-guardrail-slow-tests.jsonl
          if-no-files-found: ignore

      # Ecowitt bridge status page suite runs reliably on CI/Linux but
      # times out in low-capacity sandboxes. Run with the exact parity
      # command, capture full verbose output + exit code as artifacts,
      # and fail the job if the suite does not complete with exit 0.
      # See docs/test-validation-notes.md.
      - name: Run ecowitt bridge CI validation
        id: ecowitt_bridge_ci
        shell: bash
        run: |
          mkdir -p artifacts
          echo "not-run" > artifacts/ecowitt-bridge-ci-exit-code.txt
          : > artifacts/ecowitt-bridge-ci-output.txt
          set +e
          NODE_OPTIONS=--max-old-space-size=4096 bunx vitest run src/test/ecowitt-bridge-status-page.test.tsx --reporter=verbose --isolate --pool=forks 2>&1 | tee artifacts/ecowitt-bridge-ci-output.txt
          status=${PIPESTATUS[0]}
          set -e
          echo "$status" > artifacts/ecowitt-bridge-ci-exit-code.txt
          echo "Ecowitt bridge CI validation exit code: $status"
          exit "$status"

      - name: Upload ecowitt bridge CI validation artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ecowitt-bridge-ci-validation
          path: |
            artifacts/ecowitt-bridge-ci-output.txt
            artifacts/ecowitt-bridge-ci-exit-code.txt
          if-no-files-found: warn

      - name: Build
        run: bun run build

  # Dedicated legal SEO regression gate.
  #
  # Stable job id `legal-seo` and stable step name `test:legal-seo` — this is
  # the required status check name to configure in GitHub branch protection /
  # rulesets for `main` after this workflow lands and runs once.
  #
  # Runs on every pull request (no path filters) so a required check never
  # stays pending due to path skipping. `merge_group` is included so the
  # merge queue also gates on this job when enabled.
  #
  # Covers both the jsdom vitest suite (canonical/OG/Twitter/JSON-LD DOM
  # assertions) AND the Playwright runtime spec against the live dev server.
  # Playwright artifacts (report/results/screenshots) upload only on failure.
  legal-seo:
    name: test:legal-seo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Legal page SEO structured data (vitest)
        run: bun run test:legal-seo

      - name: Install Playwright browsers (chromium + deps)
        run: bunx playwright install --with-deps chromium

      - name: Legal page SEO metadata (Playwright)
        run: bun run test:legal-seo:e2e

      - name: Upload Playwright artifacts (failure only)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: legal-seo-playwright-artifacts
          path: |
            playwright-report/
            test-results/
            e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 14

