name: PR425 CI diagnostics

on:
  push:
    branches:
      - tmp/pr425-ci-diagnostics
    paths:
      - .github/workflows/pr425-ci-diagnostics.yml
  pull_request:
    branches:
      - verdant-grow-diary
    paths:
      - .github/workflows/pr425-ci-diagnostics.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture lint and shard 4
        shell: bash
        run: |
          mkdir -p artifacts/pr425-diagnostics
          set +e
          bun run lint > artifacts/pr425-diagnostics/lint.log 2>&1
          lint_status=$?
          bunx vitest run --shard=4/8 --reporter=verbose > artifacts/pr425-diagnostics/shard4.log 2>&1
          shard_status=$?
          set -e
          printf '%s\n' "$lint_status" > artifacts/pr425-diagnostics/lint-exit.txt
          printf '%s\n' "$shard_status" > artifacts/pr425-diagnostics/shard4-exit.txt
          tail -n 120 artifacts/pr425-diagnostics/lint.log || true
          tail -n 200 artifacts/pr425-diagnostics/shard4.log || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr425-ci-diagnostics
          path: artifacts/pr425-diagnostics/
          if-no-files-found: error
          retention-days: 3

      - name: Preserve diagnostic verdict
        shell: bash
        run: |
          lint_status="$(cat artifacts/pr425-diagnostics/lint-exit.txt)"
          shard_status="$(cat artifacts/pr425-diagnostics/shard4-exit.txt)"
          echo "lint_status=$lint_status"
          echo "shard4_status=$shard_status"
          if [ "$lint_status" -ne 0 ] || [ "$shard_status" -ne 0 ]; then
            exit 1
          fi
