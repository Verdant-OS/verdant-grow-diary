name: Contextual Pheno Comparison v0

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contextual-pheno-comparison-v0:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # v0.5: Full Contextual Pheno Comparison v0 suite — view-model,
      # panel, demo page, a11y, layout, empty-states, evidence badges,
      # static safety (with grouped local report + GitHub annotations
      # on failure), plus the sensor-safety static scan. Read-only.
      # No model/API calls. No deploys.
      - name: Run Contextual Pheno Comparison v0 suite
        run: bun run test:contextual-pheno-comparison-v0

      - name: Static safety utility unit tests
        run: bunx vitest run src/test/contextual-pheno-comparison-static-safety-utils.test.ts

      - name: Typecheck
        run: bun run typecheck
