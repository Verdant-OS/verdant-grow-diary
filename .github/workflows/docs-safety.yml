name: docs-safety

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      # Cache Bun's global install cache to speed up subsequent runs.
      # Key includes OS + lockfile + package.json hash so changes invalidate.
      - name: Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # CI must NEVER use --dry-run; failures must exit non-zero.
      - name: Run unified docs safety scanners (strict)
        run: bun run docs:assert-safety

      - name: Run automated phenotyping docs safety tests
        run: bunx vitest run src/test/assert-automated-phenotyping-docs-safety.test.ts --reporter=dot

      - name: Run demo docs banned-phrase safety tests
        run: bun run test:docs-demo-safety

      # Stop-ship: no client-side service_role / SUPABASE_SERVICE_ROLE_KEY
      # references in executable code. See scripts/assert-client-secret-boundary.mjs.
      - name: Client secret boundary guard
        run: bun run test:client-secret-boundary

      # Non-secret proof artifact. Generated only AFTER the guard step
      # succeeds (no `if: always()`) so the upload is trusted-proof, not
      # a debugging dump. Contains a short fixed summary — no logs,
      # secrets, env, or payloads.
      - name: Client secret boundary proof artifact (compose)
        run: |
          mkdir -p artifacts/client-secret-boundary
          cat > artifacts/client-secret-boundary/client-secret-boundary-proof.txt <<'EOF'
          Client secret boundary guard: PASS
          Workflow: docs-safety.yml
          Command: bun run test:client-secret-boundary
          Scanned client roots: src/components, src/pages, src/hooks, src/lib
          Blocked executable-code terms: SUPABASE_SERVICE_ROLE_KEY, service_role
          Secrets printed: no
          Raw logs uploaded: no
          EOF
      - name: Upload client secret boundary proof
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-secret-boundary-proof-docs-safety
          path: artifacts/client-secret-boundary/client-secret-boundary-proof.txt
          if-no-files-found: error
          retention-days: 14
