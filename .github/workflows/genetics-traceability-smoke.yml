name: Genetics traceability smoke (mocked)

# Non-destructive Playwright regression proof for the Genetics traceability
# surfaces (Genetics & Propagation Traceability V1).
#
# SAFETY:
#  - Mocked / non-destructive only. The spec injects a clearly-fake session and
#    intercepts every Supabase auth, REST, RPC, and edge-function request via
#    page.route(); no real backend is contacted and no real write is issued.
#  - No real accounts created, no real grow data touched, no secrets read.
#  - Uses the SAFE pull_request event only — never the elevated PR target event.
#  - No schedule/cron trigger.

on:
  pull_request:
    branches: [verdant-grow-diary]
    paths:
      - "e2e/genetics-propagation-traceability.spec.ts"
      - "src/pages/GeneticsLibrary.tsx"
      - "src/pages/AccessionDetail.tsx"
      - "src/pages/PropagationBatchDetail.tsx"
      - "src/pages/ScreeningQuarantineHistory.tsx"
      - "src/pages/TraceabilityView.tsx"
      - "src/components/genetics/**"
      - "src/lib/genetics/**"
      - "playwright.config.ts"
      - ".github/workflows/genetics-traceability-smoke.yml"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"
  workflow_dispatch: {}

jobs:
  genetics-traceability-smoke:
    name: Genetics traceability smoke (mocked / non-destructive)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Install Chromium only (with deps)
        run: bunx playwright install chromium --with-deps

      - name: Run mocked genetics traceability proof (overflow + semantic tree, 320/375/768/1440)
        run: bunx playwright test e2e/genetics-propagation-traceability.spec.ts --project=chromium-mocked

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: genetics-traceability-playwright-report
          path: playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test-results
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: genetics-traceability-test-results
          path: test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Job summary — mocked/non-destructive
        if: ${{ always() }}
        run: |
          {
            echo "### Genetics traceability smoke (mocked / non-destructive)";
            echo "";
            echo "- Mocked / non-destructive: **yes**";
            echo "- Fake session; all Supabase auth/REST/RPC/edge traffic intercepted via page.route()";
            echo "- No real accounts, no real writes, no secrets";
            echo "- Zero horizontal overflow + semantic role=tree lineage at 320 / 375 / 768 / 1440";
          } >> "$GITHUB_STEP_SUMMARY"
