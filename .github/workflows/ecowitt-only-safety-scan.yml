name: EcoWitt-only safety scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ecowitt-only-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Assert EcoWitt-only sensor direction (no SwitchBot)
        run: node scripts/assert-ecowitt-only-sensor-direction.mjs
