name: jsonld-rich-results

on:
  pull_request:
    paths:
      - "src/**"
      - "index.html"
      - "scripts/validate-jsonld-rich-results.mjs"
      - "vite.config.ts"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/jsonld-rich-results.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Cache Bun install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build (runs postbuild JSON-LD validator)
        run: bun run build
      - name: Explicit JSON-LD Rich Results check
        run: bun run check:jsonld
      - name: Validator unit tests
        run: bunx vitest run src/test/validate-jsonld-rich-results.test.ts --reporter=dot
