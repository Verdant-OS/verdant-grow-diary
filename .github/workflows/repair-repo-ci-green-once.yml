name: One-shot repository CI baseline repair

on:
  push:
    branches:
      - fix/repo-ci-green
    paths:
      - .github/workflows/repair-repo-ci-green-once.yml

permissions:
  contents: write

concurrency:
  group: repair-repo-ci-green-once
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/repo-ci-green
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply exact deterministic repairs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path_str: str, old: str, new: str, expected_count: int = 1) -> None:
              path = Path(path_str)
              text = path.read_text()
              count = text.count(old)
              if count != expected_count:
                  raise SystemExit(f"{path_str}: expected {expected_count} occurrence(s), found {count}: {old!r}")
              path.write_text(text.replace(old, new, expected_count))

          # CI reproducibility: eliminate the two remaining floating Bun versions.
          for workflow in [
              ".github/workflows/deployment-preview.yml",
              ".github/workflows/prefix-diff-sarif.yml",
          ]:
              replace_exact(workflow, "bun-version: latest", "bun-version: 1.3.14")

          # xlsx 0.20.x ESM does not auto-bind node:fs under Vitest.
          workbook = Path("src/test/release-workbook-formula-snapshots.test.ts")
          text = workbook.read_text()
          marker = 'const CONTRACTS_MD = join(ART, "release-workbook-formula-contracts.md");\n'
          helper = marker + '\nfunction readWorkbook(path: string): XLSX.WorkBook {\n  return XLSX.read(readFileSync(path));\n}\n'
          if "function readWorkbook(" not in text:
              if text.count(marker) != 1:
                  raise SystemExit("Workbook helper insertion marker missing or duplicated")
              text = text.replace(marker, helper, 1)
          call_count = text.count("XLSX.readFile(")
          if call_count != 7:
              raise SystemExit(f"Expected 7 XLSX.readFile calls, found {call_count}")
          workbook.write_text(text.replace("XLSX.readFile(", "readWorkbook("))

          # Adapter contract now includes the nullable plantType field.
          replace_exact(
              "src/lib/growAdapters.test.ts",
              "      medium: null,\n      potSize: null,\n    });",
              "      medium: null,\n      potSize: null,\n      plantType: null,\n    });",
          )

          # ESM-safe path separator import; no CommonJS require in TS tests.
          replace_exact(
              "src/test/edge-shared-mirror-static-safety.test.ts",
              'import { join, relative, resolve } from "node:path";',
              'import { join, relative, resolve, sep } from "node:path";',
          )
          replace_exact(
              "src/test/edge-shared-mirror-static-safety.test.ts",
              '!f.startsWith(MIRROR + require("node:path").sep)',
              "!f.startsWith(MIRROR + sep)",
          )
          PY

      - name: Validate lint and typecheck
        run: |
          bun run lint
          bun run typecheck

      - name: Validate exact repaired contracts
        run: |
          bunx vitest run \
            src/test/release-workbook-formula-snapshots.test.ts \
            src/lib/growAdapters.test.ts \
            src/test/edge-shared-mirror-static-safety.test.ts \
            src/test/github-actions-bun-version-pinning.test.ts \
            src/test/verdant-seo-sitemap-robots.test.ts \
            --reporter=verbose

      - name: Validate build and diff safety
        run: |
          bun run build
          git diff --check

      - name: Commit only permanent repairs and remove helper workflow
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD --staged --worktree docs/artifacts || true
          git clean -fd docs/artifacts
          rm .github/workflows/repair-repo-ci-green-once.yml
          git status --short
          unexpected="$(git status --porcelain | awk '$2 !~ /^(\.github\/workflows\/deployment-preview\.yml|\.github\/workflows\/prefix-diff-sarif\.yml|src\/test\/release-workbook-formula-snapshots\.test\.ts|src\/lib\/growAdapters\.test\.ts|src\/test\/edge-shared-mirror-static-safety\.test\.ts|\.github\/workflows\/repair-repo-ci-green-once\.yml)$/ { print }')"
          if [ -n "$unexpected" ]; then
            echo "Unexpected files changed:"
            echo "$unexpected"
            exit 1
          fi
          git add -A
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "fix(ci): restore repository green baseline"
          git push origin HEAD:fix/repo-ci-green
