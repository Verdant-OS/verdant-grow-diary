name: Required money-critical migrations present

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/assert-required-money-migrations.mjs"
      - "scripts/assert-required-money-migrations-applied.mjs"
      - "scripts/assert-no-unreviewed-money-migrations.mjs"
      - "scripts/required-money-migrations.mjs"
      - "scripts/collect-money-edge-function-logs.mjs"
      - "src/test/required-money-migrations-version.test.ts"
      - ".github/workflows/required-money-migrations.yml"

  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target env label for logs (live | sandbox)"
        required: true
        default: "sandbox"

permissions:
  contents: read
  pull-requests: write

jobs:
  assert-required-money-migrations:
    name: Assert required credit-spend + referral migrations present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert filename allowlist
        run: node scripts/assert-required-money-migrations.mjs
      - name: Assert no unreviewed money-adjacent migrations
        run: node scripts/assert-no-unreviewed-money-migrations.mjs

  assert-money-migrations-applied-sandbox:
    name: Assert money migrations applied in SANDBOX
    needs: assert-required-money-migrations
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target_env == 'sandbox' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Prepare audit dir
        run: mkdir -p "${{ github.workspace }}/audit/sandbox/logs"
      - name: Verify applied migrations in sandbox DB
        id: verify_sandbox
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_SANDBOX }}
          TARGET_ENV: sandbox
          REPORT_PATH: ${{ github.workspace }}/audit/sandbox/report.md
          AUDIT_PATH: ${{ github.workspace }}/audit/sandbox/applied-audit.json
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            printf '### Money-critical migration deploy guard — SANDBOX\n\n**Status:** ❌ SUPABASE_DB_URL_SANDBOX secret is not configured\n\nThe deploy guard could not run because the sandbox database connection secret is missing.\nConfigure `SUPABASE_DB_URL_SANDBOX` in the repository secrets and re-run the workflow.\n\n_Do NOT deploy until this check passes._\n' > "$REPORT_PATH"
            echo "::error::SUPABASE_DB_URL_SANDBOX secret is not set. Configure it before merging money-critical changes."
            exit 1
          fi
          node scripts/assert-required-money-migrations-applied.mjs
      - name: Collect edge-function log excerpts (sandbox)
        if: always()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_SANDBOX }}
          TARGET_ENV: sandbox
          LOGS_DIR: ${{ github.workspace }}/audit/sandbox/logs
        run: node scripts/collect-money-edge-function-logs.mjs || true
      - name: Append report to workflow summary
        if: always() && hashFiles('audit/sandbox/report.md') != ''
        run: cat audit/sandbox/report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post PR comment with missing migrations
        if: failure() && github.event_name == 'pull_request' && hashFiles('audit/sandbox/report.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: money-migration-guard-sandbox
          path: audit/sandbox/report.md
      - name: Clear stale sandbox PR comment on success
        if: success() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: money-migration-guard-sandbox
          delete: true
      - name: Upload sandbox audit bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: money-migration-audit-sandbox
          path: audit/sandbox
          if-no-files-found: warn

  assert-money-migrations-applied-live:
    name: Assert money migrations applied in LIVE (pre-deploy gate)
    needs: assert-required-money-migrations
    # Only run against live on main pushes or an explicit dispatch — never on PRs.
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.target_env == 'live') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Prepare audit dir
        run: mkdir -p "${{ github.workspace }}/audit/live/logs"
      - name: Verify applied migrations in live DB
        id: verify_live
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_LIVE }}
          TARGET_ENV: live
          REPORT_PATH: ${{ github.workspace }}/audit/live/report.md
          AUDIT_PATH: ${{ github.workspace }}/audit/live/applied-audit.json
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            printf '### Money-critical migration deploy guard — LIVE\n\n**Status:** ❌ SUPABASE_DB_URL_LIVE secret is not configured\n\nThe deploy guard could not run because the live database connection secret is missing.\nConfigure `SUPABASE_DB_URL_LIVE` in the repository secrets and re-run the workflow.\n\n_Do NOT deploy until this check passes._\n' > "$REPORT_PATH"
            echo "::error::SUPABASE_DB_URL_LIVE secret is not set. Configure it before deploying money-critical changes to live."
            exit 1
          fi
          node scripts/assert-required-money-migrations-applied.mjs
      - name: Collect edge-function log excerpts (live)
        if: always()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_LIVE }}
          TARGET_ENV: live
          LOGS_DIR: ${{ github.workspace }}/audit/live/logs
        run: node scripts/collect-money-edge-function-logs.mjs || true
      - name: Append report to workflow summary
        if: always() && hashFiles('audit/live/report.md') != ''
        run: cat audit/live/report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload live audit bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: money-migration-audit-live
          path: audit/live
          if-no-files-found: warn
