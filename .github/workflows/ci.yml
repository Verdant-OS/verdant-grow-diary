name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      # Stop-ship: the V0 operating loop contract test must pass.
      # See docs/v0-operating-loop-demo.md ("V0 contract test").
      - name: V0 operating loop contract test
        run: bunx vitest run src/test/v0-operating-loop-contract.test.ts

      # Stop-ship: Gate 2A CSV import safety + manual sensor freshness/delta
      # invariants must pass before any sensor-touching change merges.
      - name: Sensor safety tests (CSV + manual freshness/delta)
        run: bun run test:sensor-safety

      # Stop-ship: Action Queue provenance + alert/session token leak
      # static-safety scans must pass on every PR.
      - name: Static safety scans (Action Queue provenance + chip)
        run: bun run test:static-safety

      # Release docs safety: docs/releases/*.md must not claim unsafe
      # behavior (live telemetry, import writes, AI behavior changes,
      # Action Queue auto-writes, device control, schema/RLS/Edge changes,
      # or expose secrets/tokens/raw payloads). See
      # scripts/assert-release-docs-safety.mjs.
      - name: Release docs safety
        run: bun run docs:release-safety

      # AI Doctor Action Queue suggestion preview must remain read-only:
      # the preview helper + presenter must not drift into approved/queued/
      # executed wording, Action Queue writes, functions.invoke, service_role,
      # device-command or automation language. See
      # scripts/assert-ai-doctor-preview-safety.mjs.
      - name: AI Doctor preview safety
        run: bun run ai-doctor:preview-safety

      # Stop-ship: Action Queue device-control surface scanner + allow-list
      # guard tests. Locks the narrow safety-file allow-list (e.g.
      # `blocked_device_command_risk`, `DEVICE_COMMAND_PATTERNS`) so it can
      # never silently broaden into real actuator/control surfaces, unsafe
      # grower-facing equipment copy, `raw_payload` leakage, `service_role`,
      # or Bearer/API-key exposure. Runs on every PR.
      - name: Action Queue safety scanner + allow-list guards
        run: bunx vitest run src/test/action-queue-safety.test.ts src/test/action-queue-safety-allow-list-guards.test.ts --reporter=dot



      # Stop-ship: QuickLog v2 RPC ownership / reason-code / mixed-boundary
      # regression. See docs/quicklog-rpc-safety.md.
      - name: QuickLog v2 RPC ownership + security
        run: bun run test:quicklog-rpc-ownership

      # Stop-ship: gamification writes must remain RPC-only.
      # Static scan: no client-side .from('nug_events'|'unlocks'|'user_quests').insert.
      - name: Gamification direct-insert scan + static tests
        run: bun run test:security-gamification

      # NOTE: Gamification RLS live verification and award_nugs staging smoke
      # are intentionally NOT in this PR-default workflow. They require
      # privileged staging credentials (DB URL / service role / anon key) and
      # must not be reachable from untrusted PRs. They live in the separate
      # manual workflow .github/workflows/gamification-staging-smoke.yml,
      # gated on workflow_dispatch + push-to-main only.


      # Stop-ship: every Shelly H&T edge function declared in
      # supabase/config.toml must have its source file in the repo.
      - name: Shelly H&T edge function sources present
        run: bun run check:shelly-ht-edge-sources

      # Stop-ship: App route manifest must stay in sync with src/App.tsx and
      # every Alerts quick-link target must resolve to a registered, mounted
      # auth route. Runs on every PR to catch drift before the full suite.
      - name: Route manifest + Alerts quick-link drift
        run: bunx vitest run src/test/route-manifest-sync.test.ts src/test/alerts-route-quick-link-contract.test.tsx

      # Stop-ship: QuickLog RPC static trust-boundary guardrails. Always runs.
      - name: QuickLog RPC static trust-boundary
        run: bun run test:db:quicklog-rpc-static

      # Optional: QuickLog RPC runtime harnesses. Only runs when staging
      # Supabase credentials are configured as repo/org secrets. The
      # orchestrator script also skips cleanly when env is missing, so this
      # step is safe to leave wired even for forked PRs.
      - name: QuickLog RPC runtime harnesses (conditional)
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' && env.SUPABASE_ANON_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bun run test:db:quicklog-rpc-runtime

      - name: Full test suite
        run: bunx vitest run


      - name: Build
        run: bun run build
