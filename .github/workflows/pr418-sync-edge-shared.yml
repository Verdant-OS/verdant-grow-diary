name: PR 418 Canonical Edge Mirror Sync

on:
  push:
    branches:
      - feature/strain-reference-library-v1
  pull_request:
    branches:
      - verdant-grow-diary
    paths:
      - ".github/workflows/pr418-sync-edge-shared.yml"
      - "src/integrations/supabase/types.ts"
      - "supabase/functions/**"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/strain-reference-library-v1
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Merge current base and run canonical generator
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin verdant-grow-diary
          git merge --no-edit origin/verdant-grow-diary
          bun run sync-edge-shared
          bun run verify-edge-shared-in-sync
          git diff --check

      - name: Commit generated output and push updated branch
        shell: bash
        run: |
          set -euo pipefail
          unexpected="$(git status --porcelain | awk '$2 !~ /^supabase\/functions\// { print }')"
          if [ -n "$unexpected" ]; then
            echo "Canonical sync changed an unexpected path:"
            echo "$unexpected"
            exit 1
          fi

          if ! git diff --quiet -- supabase/functions; then
            git add supabase/functions
            git commit -m "chore(edge): sync generated shared mirror"
          fi

          git push origin HEAD:feature/strain-reference-library-v1
