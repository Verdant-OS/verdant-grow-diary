name: One-Tent Loop smoke test

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/one-tent-loop-smoke-test.yml'
      - 'src/lib/**quicklog**'
      - 'src/lib/**QuickLog**'
      - 'src/lib/**timeline**'
      - 'src/lib/**Timeline**'
      - 'src/lib/**actionQueue**'
      - 'src/lib/**ActionQueue**'
      - 'src/lib/**aiDoctor**'
      - 'src/lib/**AiDoctor**'
      - 'src/hooks/**QuickLog**'
      - 'src/hooks/**ActionQueue**'
      - 'src/components/**QuickLog**'
      - 'src/components/**Timeline**'
      - 'src/components/**ActionQueue**'
      - 'src/components/**AiDoctor**'
      - 'src/pages/**Timeline**'
      - 'src/pages/**PlantDetail**'
      - 'src/test/**one-tent**'
      - 'src/test/**action-queue**'
      - 'src/test/**quicklog**'
      - 'src/test/**timeline**'
      - 'src/test/**sensor-intelligence**'
      - 'scripts/assert-ecowitt-only-sensor-direction.mjs'
      - 'package.json'
      - 'bun.lockb'
  workflow_dispatch:

jobs:
  one-tent-loop-smoke:
    name: One-Tent Loop smoke audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Stop-ship: protects the core Verdant operating loop
      # (Grow → Tent → Plant → Manual Reading → Snapshot → Alert →
      # Action Queue → Completion → Follow-up Diary → Timeline).
      # See docs/one-tent-loop-smoke-test-audit.md.
      - name: One-Tent Loop smoke audit
        run: bun run test:one-tent-loop-smoke

      - name: EcoWitt-only sensor direction scanner
        run: node scripts/assert-ecowitt-only-sensor-direction.mjs

      - name: Sensor Intelligence safety scanner
        run: bun run test:sensor-intelligence-safety

      - name: VPD stage mapping ownership scanner
        run: bun run test:vpd-stage-normalization-ownership
