name: Quick Log Playwright smoke

# Authenticated Quick Log Playwright smoke harness.
#
# SAFETY:
#  - No auth bypass.
#  - No hardcoded credentials in the workflow.
#  - No elevated DB role usage.
#  - No checked-in storageState; the setup project signs in via the real /auth UI
#    using repository secrets, or skips with a clear message.
#  - Uploads Playwright report + smoke JSON/text report as artifacts on every run.
#  - Never uses the elevated PR target event — only the safe pull_request event.
#
# Triggers:
#  - workflow_dispatch: manual run; fails fast if required secrets/URL are missing.
#  - push to verdant-grow-diary: best-effort; skips cleanly if secrets are unavailable.
#  - pull_request to verdant-grow-diary: best-effort; PRs without access to E2E vars/secrets
#    (e.g. forked PRs) skip cleanly with a clear non-secret message and the job
#    completes successfully.
#
# Required repository secrets / vars (configure in GitHub → Settings):
#   secrets.E2E_TEST_EMAIL
#   secrets.E2E_TEST_PASSWORD
#   vars.E2E_BASE_URL              (e.g. https://<preview-or-staging>.example)
#   vars.E2E_GROW_1_PLANT_URL      (full URL of a Grow #1 plant page)
#   vars.E2E_GROW_2_PLANT_NAME     (optional; defaults to "505 Headbanger")

on:
  workflow_dispatch:
  push:
    branches: [verdant-grow-diary]
    paths:
      - "e2e/**"
      - "playwright.config.ts"
      - ".github/workflows/quicklog-smoke.yml"
  pull_request:
    branches: [verdant-grow-diary]
    paths:
      - "e2e/**"
      - "playwright.config.ts"
      - ".github/workflows/quicklog-smoke.yml"

jobs:
  quicklog-smoke:
    name: Quick Log Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      E2E_GROW_1_PLANT_URL: ${{ vars.E2E_GROW_1_PLANT_URL }}
      E2E_GROW_2_PLANT_NAME: ${{ vars.E2E_GROW_2_PLANT_NAME }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required configuration
        id: e2e_config
        shell: bash
        run: |
          # Track presence (never echo values).
          missing=()
          [ -n "$E2E_BASE_URL" ] || missing+=("vars.E2E_BASE_URL")
          [ -n "$E2E_GROW_1_PLANT_URL" ] || missing+=("vars.E2E_GROW_1_PLANT_URL")
          [ -n "$E2E_TEST_EMAIL" ] || missing+=("secrets.E2E_TEST_EMAIL")
          [ -n "$E2E_TEST_PASSWORD" ] || missing+=("secrets.E2E_TEST_PASSWORD")

          event="${{ github.event_name }}"

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required Quick Log smoke configuration: ${missing[*]}"
            if [ "$event" = "workflow_dispatch" ]; then
              echo "Missing required Quick Log smoke configuration. Configure Actions vars/secrets." >&2
              exit 1
            elif [ "$event" = "pull_request" ]; then
              echo "Skipping Quick Log smoke: E2E vars/secrets are unavailable for this PR context."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            else
              echo "Skipping Quick Log smoke: E2E vars/secrets are unavailable for this event."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Quick Log smoke configuration present. Proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.e2e_config.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.e2e_config.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium (with OS deps)
        if: steps.e2e_config.outputs.should_run == 'true'
        run: bun run e2e:install:ci

      - name: Run Quick Log Playwright smoke
        if: steps.e2e_config.outputs.should_run == 'true'
        run: bun run e2e:quicklog-smoke

      - name: Upload smoke artifacts
        if: always() && steps.e2e_config.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: quicklog-smoke-artifacts
          if-no-files-found: warn
          retention-days: 30
          path: |
            e2e/results/quicklog-smoke-report.json
            e2e/results/quicklog-smoke-report.txt
            playwright-report/
            test-results/

      - name: Write Quick Log smoke run summary
        if: always()
        shell: bash
        env:
          SHOULD_RUN: ${{ steps.e2e_config.outputs.should_run }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Never echo secret values. Only references to secret NAMES are written.
          {
            echo "## Quick Log Playwright smoke"
            echo ""
            echo "- Workflow result: \`${JOB_STATUS}\`"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Branch/ref: \`${{ github.ref }}\`"
            if [ "${SHOULD_RUN}" = "true" ]; then
              echo "- Smoke executed: yes"
            else
              echo "- Smoke executed: no (skipped — required E2E configuration was unavailable for this event; see the \`Verify required configuration\` step)"
            fi
            echo ""
            echo "### Artifacts"
            echo ""
            echo "- Artifact name: \`quicklog-smoke-artifacts\`"
            echo "- Retention: 30 days"
            echo "- Run artifacts page: ${RUN_URL}#artifacts"
            echo ""
            echo "Contents:"
            echo ""
            echo "- \`e2e/results/quicklog-smoke-report.json\`"
            echo "- \`e2e/results/quicklog-smoke-report.txt\`"
            echo "- \`playwright-report/\`"
            echo "- \`test-results/\`"
            echo ""
            echo "### Troubleshooting"
            echo ""
            echo "Open \`quicklog-smoke-report.txt\` first (then the JSON sibling) and find the first \`✗\` line. Then inspect the matching Playwright trace, screenshots, and video under \`playwright-report/\` and \`test-results/\`."
          } >> "$GITHUB_STEP_SUMMARY"
