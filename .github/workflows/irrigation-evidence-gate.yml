name: Irrigation evidence gate

# Authoritative, non-production proof for Irrigation Evidence Ledger V1.
#
# Hard lines:
#   - local Supabase only; no link, remote push, or repository secrets
#   - ephemeral local keys are masked before entering the harness process
#   - authenticated assertions call the canonical quicklog_save_event RPC
#   - browser proof loads Verdant's real CSS and performs no network writes
#   - failures are blocking; no continue-on-error or false-green skip lane

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches: [verdant-grow-diary]
    paths:
      - ".github/workflows/irrigation-evidence-gate.yml"
      - "scripts/run-irrigation-evidence-rls-harness.ts"
      - "src/test/irrigation-evidence-rls-harness-static-safety.test.ts"
      - "src/test/irrigation-overflow-structure.test.tsx"
      - "supabase/config.toml"
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "e2e/irrigation-overflow.spec.ts"
      - "e2e/fixtures/irrigation-overflow*"
      - "src/components/irrigation/**"
      - "src/components/ui/**"
      - "src/hooks/useTentIrrigationLedger.ts"
      - "src/index.css"
      - "src/lib/irrigation/**"
      - "src/lib/quickLogWatering*"
      - "src/lib/writeQuickLogWateringTypedEvent.ts"
      - "playwright.config.ts"
      - "postcss.config.js"
      - "tailwind.config.ts"
      - "vite.config.ts"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"
  push:
    branches: [verdant-grow-diary]
    paths:
      - ".github/workflows/irrigation-evidence-gate.yml"
      - "scripts/run-irrigation-evidence-rls-harness.ts"
      - "src/test/irrigation-evidence-rls-harness-static-safety.test.ts"
      - "src/test/irrigation-overflow-structure.test.tsx"
      - "supabase/config.toml"
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "e2e/irrigation-overflow.spec.ts"
      - "e2e/fixtures/irrigation-overflow*"
      - "src/components/irrigation/**"
      - "src/components/ui/**"
      - "src/hooks/useTentIrrigationLedger.ts"
      - "src/index.css"
      - "src/lib/irrigation/**"
      - "src/lib/quickLogWatering*"
      - "src/lib/writeQuickLogWateringTypedEvent.ts"
      - "playwright.config.ts"
      - "postcss.config.js"
      - "tailwind.config.ts"
      - "vite.config.ts"
      - "package.json"
      - "bun.lock"
      - "bun.lockb"

concurrency:
  group: irrigation-evidence-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  irrigation-rls-runtime:
    name: Irrigation runtime trust boundary (local Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.109.1

      - name: Start disposable local Supabase
        run: |
          set -euo pipefail
          mkdir -p artifacts/irrigation-evidence
          # Supabase prints ephemeral credentials in its startup summary. Keep
          # that output private until the next step has masked every credential;
          # only a redacted diagnostic copy is persisted on failure. Use the
          # same full-stack start path as the pgTAP gate instead of a brittle
          # exclude list, because the local CLI's service dependency graph can
          # change across Supabase releases.
          if ! supabase start --workdir . >"${RUNNER_TEMP}/irrigation-supabase-start.log" 2>&1; then
            grep -Eiv '(ANON_KEY|SERVICE_ROLE_KEY|JWT_SECRET|SECRET_KEY|DB_URL|DATABASE_URL|API KEY|access token)' \
              "${RUNNER_TEMP}/irrigation-supabase-start.log" \
              > artifacts/irrigation-evidence/supabase-start-redacted.log || true
            echo "::error::Disposable local Supabase failed to start"
            exit 1
          fi
          if ! supabase db reset --local >"${RUNNER_TEMP}/irrigation-supabase-reset.log" 2>&1; then
            grep -Eiv '(ANON_KEY|SERVICE_ROLE_KEY|JWT_SECRET|SECRET_KEY|DB_URL|DATABASE_URL|API KEY|access token)' \
              "${RUNNER_TEMP}/irrigation-supabase-reset.log" \
              > artifacts/irrigation-evidence/supabase-reset-redacted.log || true
            echo "::error::Disposable local Supabase migration reset failed"
            exit 1
          fi

      - name: Export masked loopback credentials
        run: |
          set -euo pipefail
          eval "$(supabase status -o env)"
          case "${API_URL}" in
            http://127.0.0.1:*|http://localhost:*) ;;
            *) echo "::error::Supabase API is not loopback"; exit 2 ;;
          esac
          echo "::add-mask::${ANON_KEY}"
          echo "::add-mask::${SERVICE_ROLE_KEY}"
          echo "::add-mask::${DB_URL}"
          {
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "SUPABASE_DB_URL=${DB_URL}"
          } >> "$GITHUB_ENV"

      - name: Run authenticated irrigation boundary matrix
        run: |
          set -euo pipefail
          mkdir -p artifacts/irrigation-evidence
          bun run test:irrigation-evidence-rls:local-lane 2>&1 \
            | tee artifacts/irrigation-evidence/runtime-harness.log

      - name: Upload runtime failure log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: irrigation-evidence-runtime-failure
          path: |
            artifacts/irrigation-evidence/runtime-harness.log
            artifacts/irrigation-evidence/supabase-start-redacted.log
            artifacts/irrigation-evidence/supabase-reset-redacted.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true

  irrigation-overflow:
    name: Irrigation overflow (real Verdant CSS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Cache Playwright Chromium
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium with operating-system dependencies
        run: bunx playwright install chromium --with-deps

      - name: Run styled responsive overflow proof
        run: >-
          bunx playwright test e2e/irrigation-overflow.spec.ts
          --project=chromium-mocked --reporter=list,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: irrigation-overflow-playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: irrigation-overflow-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Write proof summary
        if: success()
        run: |
          {
            echo "### Irrigation overflow proof"
            echo ""
            echo "- Real Verdant stylesheet loaded: asserted via computed CSS"
            echo "- Widths: 320, 375, 390, 768, 1440 px"
            echo "- Responsive columns: 1 / 1 / 1 / 2 / 3"
            echo "- Long root-zone note rendered in the review panel"
            echo "- No authentication, network writes, automation, or device control"
          } >> "$GITHUB_STEP_SUMMARY"
