name: One-shot full-suite batches 1 5 10 repair

on:
  push:
    branches:
      - fix/full-suite-batches-1-5-10
    paths:
      - .github/workflows/fix-full-suite-batches-1-5-10-once.yml
  pull_request:
    branches:
      - verdant-grow-diary
    paths:
      - .github/workflows/fix-full-suite-batches-1-5-10-once.yml

permissions:
  contents: write

concurrency:
  group: fix-full-suite-batches-1-5-10-once
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/full-suite-batches-1-5-10
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply exact source fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          # Batch 1: xlsx 0.20.x ESM does not auto-bind node:fs under Vitest.
          test_path = Path("src/test/release-workbook-formula-snapshots.test.ts")
          text = test_path.read_text()
          if "function readWorkbook(" not in text:
              marker = 'const CONTRACTS_MD = join(ART, "release-workbook-formula-contracts.md");\n'
              helper = marker + '\nfunction readWorkbook(path: string): XLSX.WorkBook {\n  return XLSX.read(readFileSync(path));\n}\n'
              if marker not in text:
                  raise SystemExit("Workbook helper insertion marker missing")
              text = text.replace(marker, helper, 1)
          replacements = text.count("XLSX.readFile(")
          if replacements != 7:
              raise SystemExit(f"Expected 7 XLSX.readFile calls, found {replacements}")
          text = text.replace("XLSX.readFile(", "readWorkbook(")
          test_path.write_text(text)

          # Batch 5: pin the only two remaining floating Bun aliases.
          for filename in [
              ".github/workflows/deployment-preview.yml",
              ".github/workflows/prefix-diff-sarif.yml",
          ]:
              path = Path(filename)
              value = path.read_text()
              count = value.count("bun-version: latest")
              if count != 1:
                  raise SystemExit(f"Expected one floating Bun alias in {filename}, found {count}")
              path.write_text(value.replace("bun-version: latest", "bun-version: 1.3.14"))

          # Batch 10: advertise every currently pre-rendered cultivar detail route.
          sitemap_path = Path("public/sitemap.xml")
          sitemap = sitemap_path.read_text()
          routes = [
              "sour-diesel",
              "og-kush",
              "blue-dream",
              "gg4",
              "lemon-cherry-gelato",
              "jack-herer",
              "sour-stomper",
          ]
          blocks = []
          for slug in routes:
              loc = f"https://verdantgrowdiary.com/cultivars/{slug}"
              if loc in sitemap:
                  continue
              blocks.append(
                  "  <url>\n"
                  f"    <loc>{loc}</loc>\n"
                  "    <lastmod>2026-07-23</lastmod>\n"
                  "    <changefreq>monthly</changefreq>\n"
                  "    <priority>0.7</priority>\n"
                  "  </url>\n"
              )
          if blocks:
              marker = "  <url>\n    <loc>https://verdantgrowdiary.com/cultivars/oreoz</loc>"
              if marker not in sitemap:
                  raise SystemExit("Cultivar sitemap insertion marker missing")
              sitemap = sitemap.replace(marker, "".join(blocks) + marker, 1)
              sitemap_path.write_text(sitemap)
          PY

      - name: Validate exact failing contracts
        run: |
          bunx vitest run src/test/release-workbook-formula-snapshots.test.ts --reporter=verbose
          bunx vitest run src/test/github-actions-bun-version-pinning.test.ts --reporter=verbose
          bunx vitest run src/test/sitemap-public-route-parity.test.ts --reporter=verbose

      - name: Typecheck and diff safety
        run: |
          bun run typecheck
          git diff --check

      - name: Commit only final fixes and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD --staged --worktree docs/artifacts || true
          git clean -fd docs/artifacts
          rm .github/workflows/fix-full-suite-batches-1-5-10-once.yml
          git status --short
          unexpected="$(git status --porcelain | awk '$2 !~ /^(src\/test\/release-workbook-formula-snapshots\.test\.ts|\.github\/workflows\/deployment-preview\.yml|\.github\/workflows\/prefix-diff-sarif\.yml|public\/sitemap\.xml|\.github\/workflows\/fix-full-suite-batches-1-5-10-once\.yml)$/ { print }')"
          if [ -n "$unexpected" ]; then
            echo "Unexpected files changed:"
            echo "$unexpected"
            exit 1
          fi
          git add -A
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "fix(ci): resolve full-suite batches 1 5 and 10"
          git push origin HEAD:fix/full-suite-batches-1-5-10
