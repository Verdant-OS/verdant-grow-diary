name: Quick Log gate (typecheck + targeted tests)

# Fail-fast gate for PRs to the deploy branch:
#
#   1. `bun run typecheck` runs FIRST. If it is red, the job fails
#      immediately and the targeted tests never run.
#   2. Only after a green typecheck do the targeted Quick Log note-sync
#      tests run (legacy preview rules + legacy note sync + V2 note sync).
#
# WHY THIS EXISTS: the repo's main CI (`ci.yml`) triggers on PRs to `main`,
# not `verdant-grow-diary` — so a typecheck regression could merge to the
# deploy branch with green checks (this happened when the auto-generated
# Supabase types were regenerated and dropped tables the pheno services
# depend on). This gate closes that hole for the deploy branch with a fast,
# narrow job; it does NOT replace the broader suites.
#
# Rules:
#  - Step order enforces sequencing — no shell tricks.
#  - NEVER add `continue-on-error` to the typecheck or test steps.
#  - No secrets required; safe for forked PRs.

on:
  workflow_dispatch:
  pull_request:
    branches: [verdant-grow-diary]

jobs:
  quicklog-gate:
    name: Typecheck, then targeted Quick Log tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Gate 1 — typecheck. A failure here fails the job before any test runs.
      - name: Typecheck
        run: bun run typecheck

      # Gate 2 — targeted Quick Log note-sync tests. Runs ONLY after a green
      # typecheck (previous step failing aborts the job).
      - name: Quick Log targeted tests
        run: bunx vitest run src/test/quicklog-preview.test.ts src/test/quicklog-preview-note-presence.test.ts src/test/quick-log-note-sync.test.tsx src/test/quick-log-v2-note-sync.test.tsx src/test/quick-log-v2-save-payload.test.ts
