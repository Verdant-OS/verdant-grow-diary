name: One-shot final repository CI repair

on:
  push:
    branches:
      - fix/repo-ci-green-final
    paths:
      - .github/workflows/repair-repo-ci-green-final-once.yml
  pull_request:
    branches:
      - verdant-grow-diary
    paths:
      - .github/workflows/repair-repo-ci-green-final-once.yml

permissions:
  contents: write

concurrency:
  group: repair-repo-ci-green-final-once
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPAIR_BRANCH: fix/repo-ci-green-final
    steps:
      - name: Checkout exact repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/repo-ci-green-final
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply six deterministic test and CI repairs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path_str: str, old: str, new: str, expected_count: int = 1) -> None:
              path = Path(path_str)
              text = path.read_text()
              count = text.count(old)
              if count != expected_count:
                  raise SystemExit(f"{path_str}: expected {expected_count} occurrence(s), found {count}: {old!r}")
              path.write_text(text.replace(old, new, expected_count))

          for workflow in [
              ".github/workflows/deployment-preview.yml",
              ".github/workflows/prefix-diff-sarif.yml",
          ]:
              replace_exact(workflow, "bun-version: latest", "bun-version: 1.3.14")

          workbook = Path("src/test/release-workbook-formula-snapshots.test.ts")
          text = workbook.read_text()
          marker = 'const CONTRACTS_MD = join(ART, "release-workbook-formula-contracts.md");\n'
          helper = marker + '\nfunction readWorkbook(path: string): XLSX.WorkBook {\n  return XLSX.read(readFileSync(path));\n}\n'
          if "function readWorkbook(" not in text:
              if text.count(marker) != 1:
                  raise SystemExit("Workbook helper insertion marker missing or duplicated")
              text = text.replace(marker, helper, 1)
          call_count = text.count("XLSX.readFile(")
          if call_count != 7:
              raise SystemExit(f"Expected 7 XLSX.readFile calls, found {call_count}")
          workbook.write_text(text.replace("XLSX.readFile(", "readWorkbook("))

          replace_exact(
              "src/lib/growAdapters.test.ts",
              "      medium: null,\n      potSize: null,\n    });",
              "      medium: null,\n      potSize: null,\n      plantType: null,\n    });",
          )

          replace_exact(
              "src/test/edge-shared-mirror-static-safety.test.ts",
              'import { join, relative, resolve } from "node:path";',
              'import { join, relative, resolve, sep } from "node:path";',
          )
          replace_exact(
              "src/test/edge-shared-mirror-static-safety.test.ts",
              '!f.startsWith(MIRROR + require("node:path").sep)',
              "!f.startsWith(MIRROR + sep)",
          )

          referral = Path("src/test/referral-redeem.test.ts")
          text = referral.read_text()
          import_marker = 'import { OAUTH_REFERRAL_STORAGE_KEY } from "@/lib/oauthReferralCaptureRules";\n'
          helper_import = import_marker + 'import { clearLocalStorageForTest, getLocalStorageItemForTest } from "./helpers/localStorageTestHelper";\n'
          if text.count(import_marker) != 1:
              raise SystemExit("Referral helper import marker missing or duplicated")
          text = text.replace(import_marker, helper_import, 1)
          if text.count("window.localStorage.clear();") != 1:
              raise SystemExit("Expected one direct localStorage.clear call")
          text = text.replace("window.localStorage.clear();", "clearLocalStorageForTest();")
          get_count = text.count("window.localStorage.getItem(")
          if get_count != 3:
              raise SystemExit(f"Expected three direct localStorage.getItem calls, found {get_count}")
          text = text.replace("window.localStorage.getItem(", "getLocalStorageItemForTest(")
          referral.write_text(text)
          PY

      - name: Validate lint, typecheck, and localStorage policy
        run: |
          bun run lint
          bun run typecheck
          node scripts/assert-test-localstorage-helper-usage.mjs
          node scripts/test-localstorage-helper-usage-audit.mjs

      - name: Validate exact repaired contracts
        run: |
          bunx vitest run \
            src/test/release-workbook-formula-snapshots.test.ts \
            src/lib/growAdapters.test.ts \
            src/test/edge-shared-mirror-static-safety.test.ts \
            src/test/github-actions-bun-version-pinning.test.ts \
            src/test/referral-redeem.test.ts \
            --reporter=verbose

      - name: Validate production build and diff safety
        run: |
          bun run build
          git diff --check

      - name: Create one exact Git Data commit
        shell: bash
        run: |
          set -euo pipefail
          repo="$GITHUB_REPOSITORY"
          ref_path="heads/$REPAIR_BRANCH"
          parent_sha="$(gh api "repos/$repo/git/ref/$ref_path" --jq '.object.sha')"
          base_tree="$(gh api "repos/$repo/git/commits/$parent_sha" --jq '.tree.sha')"

          files=(
            ".github/workflows/deployment-preview.yml"
            ".github/workflows/prefix-diff-sarif.yml"
            "src/test/release-workbook-formula-snapshots.test.ts"
            "src/lib/growAdapters.test.ts"
            "src/test/edge-shared-mirror-static-safety.test.ts"
            "src/test/referral-redeem.test.ts"
          )

          tree_entries='[]'
          for path in "${files[@]}"; do
            content="$(base64 -w0 "$path")"
            blob_sha="$(jq -n --arg content "$content" '{content:$content,encoding:"base64"}' \
              | gh api --method POST "repos/$repo/git/blobs" --input - --jq '.sha')"
            tree_entries="$(jq --arg path "$path" --arg sha "$blob_sha" \
              '. + [{path:$path,mode:"100644",type:"blob",sha:$sha}]' <<<"$tree_entries")"
          done

          tree_sha="$(jq -n --arg base_tree "$base_tree" --argjson tree "$tree_entries" \
            '{base_tree:$base_tree,tree:$tree}' \
            | gh api --method POST "repos/$repo/git/trees" --input - --jq '.sha')"
          commit_sha="$(jq -n \
            --arg message "fix(ci): restore repository green baseline" \
            --arg tree "$tree_sha" \
            --arg parent "$parent_sha" \
            '{message:$message,tree:$tree,parents:[$parent]}' \
            | gh api --method POST "repos/$repo/git/commits" --input - --jq '.sha')"
          jq -n --arg sha "$commit_sha" '{sha:$sha,force:false}' \
            | gh api --method PATCH "repos/$repo/git/refs/$ref_path" --input - >/dev/null
          echo "Committed validated repairs at $commit_sha"
