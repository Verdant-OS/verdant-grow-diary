name: Apply Strain Reference Test Contract Fixes

on:
  push:
    branches:
      - feature/strain-reference-library-v1
    paths:
      - ".github/workflows/apply-strain-reference-test-contract-fixes.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/strain-reference-library-v1
          fetch-depth: 0

      - name: Apply scoped data and search fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          library_path = Path("src/constants/strainReferenceLibrary.ts")
          library_lines = library_path.read_text(encoding="utf-8").splitlines()
          matches = [i for i, line in enumerate(library_lines) if 'slug: "sour-stomper"' in line]
          if len(matches) != 1:
              raise SystemExit(f"Expected one Sour Stomper seed row, found {len(matches)}")
          index = matches[0]
          if 'difficulty: "Intermediate"' not in library_lines[index]:
              raise SystemExit("Sour Stomper difficulty contract was not in the expected state")
          library_lines[index] = library_lines[index].replace(
              'difficulty: "Intermediate"',
              'difficulty: "Beginner-friendly"',
              1,
          )
          library_path.write_text("\n".join(library_lines) + "\n", encoding="utf-8")

          search_path = Path("src/lib/sharedSearchTextRules.ts")
          search_text = search_path.read_text(encoding="utf-8")
          old = '''export function sharedSearchTextIncludes(haystack: string, query: string): boolean {
            const needle = normalizeSharedSearchText(query);
            if (!needle) return true;
            return normalizeSharedSearchText(haystack).includes(needle);
          }'''.replace("          ", "")
          new = '''export function sharedSearchTextIncludes(haystack: string, query: string): boolean {
            const needle = normalizeSharedSearchText(query);
            if (!needle) return true;

            const normalizedHaystack = normalizeSharedSearchText(haystack);
            if (normalizedHaystack.includes(needle)) return true;

            // Preserve word-oriented normalization for ranking/display while also
            // allowing common compact aliases such as GG4 to match GG-4. This is
            // deterministic and shared by entity and cultivar discovery.
            return normalizedHaystack.replace(/\\s+/g, "").includes(needle.replace(/\\s+/g, ""));
          }'''.replace("          ", "")
          if search_text.count(old) != 1:
              raise SystemExit("Shared-search include contract was not in the expected state")
          search_path.write_text(search_text.replace(old, new), encoding="utf-8")
          PY
          rm -f .diagnostics/strain-reference-tests.txt
          rm -f .github/workflows/apply-strain-reference-test-contract-fixes.yml

      - name: Commit scoped contract fixes
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "fix(strains): align filter and punctuation search contracts"
          git push origin HEAD:feature/strain-reference-library-v1
