name: Strain Reference Library V1 Gate

on:
  push:
    branches:
      - feature/strain-reference-library-v1
  pull_request:
    paths:
      - "src/constants/strainReferenceLibrary.ts"
      - "src/constants/verdantCultivars.ts"
      - "src/lib/cultivarReference*.ts"
      - "src/lib/sharedSearchTextRules.ts"
      - "src/lib/strainSourceVerification.ts"
      - "src/pages/Cultivar*.tsx"
      - "src/test/cultivar*.test.*"
      - "src/test/shared-search-text-rules.test.ts"
      - "src/test/strain-reference-library*.test.ts"
      - "scripts/verify-cultivar-sources.mjs"
      - "supabase/migrations/20260722203000_strain_reference_library_v1.sql"
      - "docs/product/strain-reference-library-v1.md"
      - ".github/workflows/strain-reference-library-v1-gate.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Targeted library and shared-search tests
        run: >-
          bunx vitest run
          src/test/strain-reference-library-v1.test.ts
          src/test/strain-reference-library-source-verification.test.ts
          src/test/strain-reference-library-migration.test.ts
          src/test/strain-reference-library-static-safety.test.ts
          src/test/shared-search-text-rules.test.ts
          src/test/cultivar-reference-search-rules.test.ts
          src/test/cultivar-reference-view-model.test.ts
          src/test/cultivars-index-v1.test.tsx
          src/test/cultivar-page-v1.test.tsx
          src/test/cultivar-index-seo-rules.test.tsx
          src/test/static-public-seo-documents.test.ts
          --reporter=verbose

      - name: Offline source provenance verification report
        run: bun scripts/verify-cultivar-sources.mjs

      - name: Supabase migration safety — V1 finding fence
        shell: bash
        run: |
          set +e
          node scripts/check-supabase-migration-safety.mjs --json \
            > /tmp/supabase-safety.json \
            2> /tmp/supabase-safety.err
          scanner_status=$?
          set -e
          cat /tmp/supabase-safety.json
          cat /tmp/supabase-safety.err
          node - <<'NODE'
          const { readFileSync } = require("node:fs");
          const target = "20260722203000_strain_reference_library_v1.sql";
          const report = JSON.parse(readFileSync("/tmp/supabase-safety.json", "utf8"));
          const targetFindings = (report.new ?? []).filter((finding) => finding.migration === target);
          if (targetFindings.length > 0) {
            console.error(`Migration safety found ${targetFindings.length} issue(s) in ${target}.`);
            console.error(JSON.stringify(targetFindings, null, 2));
            process.exit(1);
          }
          console.log(`Migration safety: no new findings in ${target}.`);
          if ((report.new ?? []).length > 0) {
            console.log(`Whole-repo scanner also reported ${(report.new ?? []).length} unrelated pre-existing baseline finding(s); baseline remains untouched.`);
          }
          NODE
          if [ "$scanner_status" -ne 0 ]; then
            echo "::warning::Whole-repo migration safety remains red only for findings outside the Strain Reference Library V1 migration."
          fi

      - name: Sensor and no-control safety scan
        run: node scripts/sensor-safety-check.mjs

      - name: Production build and static SEO validation
        run: bun run build
