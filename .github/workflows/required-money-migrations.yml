name: Required money-critical migrations present

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/assert-required-money-migrations.mjs"
      - "scripts/assert-required-money-migrations-applied.mjs"
      - "scripts/assert-no-unreviewed-money-migrations.mjs"
      - "scripts/required-money-migrations.mjs"
      - ".github/workflows/required-money-migrations.yml"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target env label for logs (live | sandbox)"
        required: true
        default: "sandbox"

jobs:
  assert-required-money-migrations:
    name: Assert required credit-spend + referral migrations present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert filename allowlist
        run: node scripts/assert-required-money-migrations.mjs
      - name: Assert no unreviewed money-adjacent migrations
        run: node scripts/assert-no-unreviewed-money-migrations.mjs

  assert-money-migrations-applied-sandbox:
    name: Assert money migrations applied in SANDBOX
    needs: assert-required-money-migrations
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target_env == 'sandbox' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Verify applied migrations in sandbox DB
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_SANDBOX }}
          TARGET_ENV: sandbox
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL_SANDBOX secret is not set. Configure it before merging money-critical changes."
            exit 1
          fi
          node scripts/assert-required-money-migrations-applied.mjs

  assert-money-migrations-applied-live:
    name: Assert money migrations applied in LIVE (pre-deploy gate)
    needs: assert-required-money-migrations
    # Only run against live on main pushes or an explicit dispatch — never on PRs.
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.target_env == 'live') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Verify applied migrations in live DB
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_LIVE }}
          TARGET_ENV: live
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL_LIVE secret is not set. Configure it before deploying money-critical changes to live."
            exit 1
          fi
          node scripts/assert-required-money-migrations-applied.mjs
