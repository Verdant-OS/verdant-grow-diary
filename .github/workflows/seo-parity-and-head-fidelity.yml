name: SEO parity & head fidelity

# Blocks PR merges when the sitemap drifts from the pre-rendered
# route set, or when any pre-rendered dist/*.html <head> diverges
# from the manifest crawlers must see. Runs on every PR into any
# branch and on pushes to main so main stays green.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: seo-parity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seo-parity-and-head-fidelity:
    name: sitemap parity + head fidelity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Sitemap ↔ STATIC_PUBLIC_SEO_DOCUMENTS parity — fails when a
      # public route is added/removed without updating the allowlists
      # in scripts/public-route-parity.config.mjs.
      - name: Sitemap parity + head-fidelity helper tests
        run: bunx vitest run src/test/sitemap-public-route-parity.test.ts src/test/static-route-head-fidelity.test.ts --reporter=dot

      # Per-guide head-tag regression gate — asserts every entry in
      # VERDANT_SEO_GUIDES (and the Glossary) ships a correct title,
      # meta description, self-referential canonical, Open Graph
      # (og:title/description/url/type), and Twitter card metadata.
      # A new or edited guide that drops or drifts any of these tags
      # fails this step and blocks the PR.
      - name: Guides + Glossary head-tag invariants (title, canonical, OG, Twitter)
        run: bunx vitest run src/test/verdant-guides-glossary-head-invariants.test.ts src/test/verdant-seo-guides.test.ts src/test/verdant-seo-guides-render.test.tsx src/test/verdant-seo-structured-data.test.ts src/test/verdant-seo-sitemap-robots.test.ts --reporter=dot

      # Full production build; the postbuild hook runs
      # validate-static-route-head-fidelity.mjs and writes the
      # per-route diff report used below.
      - name: Build (runs postbuild head-fidelity validator)
        run: bun run build

      # Preserve the machine- and human-readable diff reports so
      # failed runs are debuggable without re-running the build.
      - name: Upload SEO head-fidelity report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: seo-head-fidelity-report
          path: |
            dist/seo-manifest.json
            dist/seo-head-fidelity-report.json
            dist/seo-head-fidelity-report.md
          if-no-files-found: warn
          retention-days: 14
