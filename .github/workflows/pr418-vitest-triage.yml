name: PR 418 Vitest Failure Triage

on:
  push:
    branches:
      - feature/strain-reference-library-v1
    paths:
      - ".github/workflows/pr418-vitest-triage.yml"

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose batch ${{ matrix.batch }}/16
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        batch: [1, 10]
    env:
      BATCH: ${{ matrix.batch }}
      BASE_SHA: feca15c541bc77105f6873ee41fd1d0436122b5d
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout PR head with history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/strain-reference-library-v1
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Identify failing file and compare with PR base
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(node --input-type=module <<'NODE'
          import { existsSync, readdirSync, statSync } from "node:fs";
          import { join, relative, resolve } from "node:path";

          const root = process.cwd();
          const testRoot = resolve(root, "src/test");
          const out = [];
          const stack = [testRoot];
          while (stack.length) {
            const current = stack.pop();
            if (!existsSync(current)) continue;
            for (const entry of readdirSync(current)) {
              const full = join(current, entry);
              const stat = statSync(full);
              if (stat.isDirectory()) stack.push(full);
              else if (/\.test\.(ts|tsx)$/.test(entry)) out.push(relative(root, full));
            }
          }
          out.sort((a, b) => (a < b ? -1 : a > b ? 1 : 0));
          const batch = Number(process.env.BATCH);
          for (let index = 0; index < out.length; index += 1) {
            if (index % 16 === batch) console.log(out[index]);
          }
          NODE
          )

          echo "TRIAGE_BATCH=$BATCH"
          echo "TRIAGE_HEAD_FILE_COUNT=${#files[@]}"

          failing_file=""
          for file in "${files[@]}"; do
            set +e
            bunx vitest run --reporter=dot --isolate --pool=forks "$file" > /tmp/pr418-head-test.log 2>&1
            first_status=$?
            set -e
            if [[ $first_status -eq 0 ]]; then
              continue
            fi

            set +e
            bunx vitest run --reporter=dot --isolate --pool=forks "$file" > /tmp/pr418-head-test-retry.log 2>&1
            retry_status=$?
            set -e

            if [[ $retry_status -eq 0 ]]; then
              echo "TRIAGE_HEAD_FLAKE_FILE=$file"
              continue
            fi

            failing_file="$file"
            echo "TRIAGE_HEAD_FAILED_FILE=$file"
            echo "--- HEAD FAILURE TAIL ---"
            tail -n 160 /tmp/pr418-head-test-retry.log
            break
          done

          if [[ -z "$failing_file" ]]; then
            echo "TRIAGE_HEAD_RESULT=PASS_OR_FLAKE_ONLY"
            exit 0
          fi

          git checkout --detach "$BASE_SHA"
          bun install --frozen-lockfile

          if [[ ! -f "$failing_file" ]]; then
            echo "TRIAGE_BASE_RESULT=MISSING_FILE"
            echo "TRIAGE_CLASSIFICATION=PR_INTRODUCED_TEST_OR_PATH"
            exit 0
          fi

          set +e
          bunx vitest run --reporter=dot --isolate --pool=forks "$failing_file" > /tmp/pr418-base-test.log 2>&1
          base_status=$?
          set -e

          if [[ $base_status -eq 0 ]]; then
            echo "TRIAGE_BASE_RESULT=PASS"
            echo "TRIAGE_CLASSIFICATION=PR_REGRESSION_OR_BASE_INTERACTION"
          else
            echo "TRIAGE_BASE_RESULT=FAIL"
            echo "TRIAGE_CLASSIFICATION=PRE_EXISTING_FAILURE"
            echo "--- BASE FAILURE TAIL ---"
            tail -n 160 /tmp/pr418-base-test.log
          fi

          exit 0
