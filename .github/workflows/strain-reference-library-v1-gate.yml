name: Strain Reference Library V1 Gate

on:
  push:
    branches:
      - feature/strain-reference-library-v1
  pull_request:
    paths:
      - "src/constants/strainReferenceLibrary.ts"
      - "src/constants/verdantCultivars.ts"
      - "src/lib/cultivarReference*.ts"
      - "src/lib/globalSearchItems.ts"
      - "src/lib/sharedSearchTextRules.ts"
      - "src/hooks/useGlobalSearchItems.ts"
      - "src/components/GlobalSearchDialog.tsx"
      - "src/pages/Cultivar*.tsx"
      - "src/test/cultivar*.test.*"
      - "src/test/global-search-entity-results.test.ts"
      - "src/test/shared-search-text-rules.test.ts"
      - "src/test/strain-reference-library*.test.ts"
      - "supabase/migrations/20260722203000_strain_reference_library_v1.sql"
      - "docs/product/strain-reference-library-v1.md"
      - ".github/workflows/strain-reference-library-v1-gate.yml"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p .diagnostics
          set +e
          bun run typecheck > .diagnostics/strain-reference-typecheck.txt 2>&1
          status=$?
          set -e
          cat .diagnostics/strain-reference-typecheck.txt
          exit "$status"

      - name: Commit focused typecheck diagnostics on branch push
        if: github.event_name == 'push' && steps.typecheck.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          git add .diagnostics/strain-reference-typecheck.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "verdant-ci"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "chore(strains): capture focused typecheck diagnostics"
          git push origin HEAD:feature/strain-reference-library-v1

      - name: Stop after typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Targeted library and shared-search tests
        run: >-
          bunx vitest run
          src/test/strain-reference-library-v1.test.ts
          src/test/strain-reference-library-migration.test.ts
          src/test/strain-reference-library-static-safety.test.ts
          src/test/shared-search-text-rules.test.ts
          src/test/cultivar-reference-search-rules.test.ts
          src/test/cultivar-reference-view-model.test.ts
          src/test/global-search-entity-results.test.ts
          src/test/cultivars-index-v1.test.tsx
          src/test/cultivar-page-v1.test.tsx
          src/test/cultivar-index-seo-rules.test.tsx
          src/test/static-public-seo-documents.test.ts
          --reporter=verbose

      - name: Supabase migration safety
        run: bun run check:supabase-security

      - name: Sensor and no-control safety scan
        run: node scripts/sensor-safety-check.mjs

      - name: Production build and static SEO validation
        run: bun run build
